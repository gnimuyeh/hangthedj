function calcResult(answers){
  // Step 1: Calculate raw score per question, sum by dimension
  const dimSum={},dimMax={},dimCount={};
  DIMS.forEach(d=>{dimSum[d.key]=0;dimMax[d.key]=0;dimCount[d.key]=0;});
  QS.forEach(q=>{
    if(answers[q.id]!==undefined){
      const chosen=answers[q.id];
      const maxPossible=Math.max(...q.o.map(o=>o.s));
      dimSum[q.d]+=Math.max(0,chosen);// only count positive scores
      dimMax[q.d]+=maxPossible;
      dimCount[q.d]++;
    }
  });
  // Step 2: Per dimension, calculate percentage of max possible
  let ts=0,tw=0;const det={};
  DIMS.forEach(d=>{
    const earned=dimSum[d.key];
    const maxP=dimMax[d.key];
    // Also apply penalty for negative answers
    const rawSum=Object.keys(answers).reduce((acc,qid)=>{
      const q=QS.find(qq=>qq.id===+qid);
      if(q&&q.d===d.key)return acc+answers[qid];return acc;
    },0);
    const negPenalty=rawSum<0?Math.abs(rawSum)*5:0;
    const pct=maxP>0?Math.max(0,Math.round((earned/maxP)*110-negPenalty)):0;
    const score=Math.min(110,Math.max(0,pct));
    det[d.key]={score};
    ts+=score*d.w;tw+=d.w;
  });
  // Overall: weighted average, theoretical max ~110, most people 55-95
  const overall=Math.min(110,Math.round(ts/tw));

  const ds={
    openness:{h:"你对非传统的生活方式有很好的接受度和理解力，非常加分",m:"你对不同的生活方式持开放态度，有不错的基础",l:"你可能更偏好传统的生活安排，这方面的差异值得多聊聊"},
    cognition:{h:"你善于学习又尊重专业，能在关系中找到很好的互补节奏",m:"你愿意学习新东西也尊重对方的专长，基础不错",l:"在认知方式和对专业的尊重上，可能需要更多磨合"},
    dynamics:{h:"你对关系分工有弹性，能灵活找到双方都舒服的平衡",m:"你在角色分配上比较灵活，有不错的调适空间",l:"你对关系中的平等有很强要求，在分工上需要找到共识"},
    material:{h:"你的消费观注重品质和体验，不被品牌绑架，很合拍",m:"你对物质有合理健康的态度",l:"在消费观念上存在一些差异，需要互相理解"},
    autonomy:{h:"你有健康的独立性，能给彼此空间又不疏离，非常契合",m:"你在独立性上比较均衡，能适应不同节奏",l:"你可能需要较多的陪伴，这方面需要找到平衡"},
    nurture:{h:"你是天生的照顾者，愿意用心经营生活品质，特别加分",m:"你有照顾人的意愿，在关系中会很温暖",l:"你可能更倾向于被照顾，这方面的期待需要沟通"},
    emotional_iq:{h:"你的情绪稳定、能量充沛、积极乐观，相处会非常舒服",m:"你有不错的情绪调节能力，能处理好关系中的起伏",l:"情绪管理方面还有成长空间，但愿意沟通就不是问题"},
    fitness:{h:"你有健康的生活习惯同时不极端，享受运动也享受生活",m:"你有一定的健康意识，在生活习惯上基础不错",l:"在运动和饮食习惯上差异较大，但可以互相影响"},
    family:{h:"你对家庭和孩子有积极态度，同时保持自我，非常契合",m:"你在事业和家庭之间的态度比较均衡",l:"在家庭投入的期望上有些差异，需要更多讨论"},
    loyalty:{h:"你对感情专注认真，有清晰的边界感，这是最重要的基础",m:"你对忠诚有基本认同，关系维护意识不错",l:"在感情专注度上可能有不同理解，需要坦诚讨论"},
    balance:{h:"你很懂得关系中的动态平衡，不执着于形式上的对等，非常成熟",m:"你对关系中的付出平衡有比较开放的态度",l:"你对关系中的平等有很高要求，在角色协调上需要更多沟通"},
    conflict:{h:"你重视沟通和成长，愿意听不同的声音，相处会非常高效",m:"你在处理冲突时比较理性，有不错的沟通基础",l:"你可能更看重情绪层面的回应，在沟通方式上需要磨合"},
    core_need:{h:"你在关系中追求精神共鸣和共同成长，非常契合",m:"你对关系有比较均衡的期待",l:"你可能更看重物质或情感层面的满足，在核心需求上需要沟通"},
  };
  Object.keys(det).forEach(k=>{const s=det[k].score;det[k].desc=s>=75?ds[k].h:s>=45?ds[k].m:ds[k].l;});
  return{overall,details:det};
}

function getLabel(s){
  if(s>=95)return{t:"天作之合",c:"#00E59B",bg:"linear-gradient(135deg,#00E59B,#00B4D8)",d:"你们在几乎所有维度上都高度一致，这种默契极其难得。"};
  if(s>=85)return{t:"超级合拍",c:"#00E59B",bg:"linear-gradient(135deg,#00E59B,#00D4AA)",d:"你们在核心价值观和生活方式上高度契合，很好的基础。"};
  if(s>=75)return{t:"很有默契",c:"#00B4D8",bg:"linear-gradient(135deg,#00B4D8,#7B68EE)",d:"你们在大部分维度上很契合，一些小差异反而增添吸引力。"};
  if(s>=65)return{t:"值得深入",c:"#FF9F43",bg:"linear-gradient(135deg,#FF9F43,#FFCC5C)",d:"你们有不错的基础，值得花更多时间去了解和磨合。"};
  if(s>=50)return{t:"有待观察",c:"#A78BFA",bg:"linear-gradient(135deg,#A78BFA,#7C3AED)",d:"你们在一些维度上有差异，需要更多时间了解彼此的想法。"};
  return{t:"差异较大",c:"#FF6B6B",bg:"linear-gradient(135deg,#FF6B6B,#EE5A6F)",d:"你们的生活方式和价值观有较大差异，但差异也可以变成成长的空间。"};
}

const C={bg:"#0F0F0F",card:"#1A1A1A",bd:"rgba(255,255,255,0.08)",text:"#F5F5F5",sub:"rgba(255,255,255,0.5)",mut:"rgba(255,255,255,0.25)",accent:"#00E59B"};
const dimLabels={openness:"生活方式",cognition:"认知互补",dynamics:"相处模式",material:"消费观",autonomy:"独立性",nurture:"生活态度",emotional_iq:"能量状态",fitness:"健康生活",family:"家庭观",loyalty:"忠诚度",balance:"关系默契",conflict:"冲突处理",core_need:"关系内核"};

function App(){
  // ─── Load cached results ───
  const[cachedRes,setCachedRes]=useState(()=>{
    try{const c=localStorage.getItem('compat_result');const a=localStorage.getItem('compat_answers');if(c&&a)return{res:JSON.parse(c),ans:JSON.parse(a)};} catch(e){}return null;
  });

  const[ph,setPh]=useState(cachedRes?"cached":"intro");
  const[qi,setQi]=useState(0);
  const[ans,setAns]=useState({});
  const[res,setRes]=useState(null);
  const[fade,setFade]=useState(true);
  const[sel,setSel]=useState(null);
  const[showAns,setShowAns]=useState(false);
  const[saving,setSaving]=useState(false);
  const[copied,setCopied]=useState(false);
  const reportRef=useRef(null);

  const go=fn=>{setFade(false);setTimeout(()=>{fn();setFade(true);},200);};
  const pick=(qid,score,idx)=>{setSel(idx);setTimeout(()=>{const na={...ans,[qid]:score};setAns(na);setSel(null);go(()=>{if(qi<QS.length-1)setQi(qi+1);else{const r=calcResult(na);setRes(r);try{localStorage.setItem('compat_result',JSON.stringify(r));localStorage.setItem('compat_answers',JSON.stringify(na));}catch(e){}setPh("result");}});},280);};
  const goBack=()=>{if(qi>0)go(()=>{const na={...ans};delete na[QS[qi-1].id];setAns(na);setQi(qi-1);});};

  const saveImage=useCallback(async()=>{
    if(!reportRef.current||saving)return;
    setSaving(true);
    try{
      // Force show answers for the screenshot
      const el=reportRef.current;
      const canvas=document.createElement('canvas');
      const ctx=canvas.getContext('2d');
      const scale=2;
      // Use a simpler approach: serialize to SVG then to canvas
      const data=new XMLSerializer().serializeToString(
        await(async()=>{
          // Fallback: use window print or blob
          const blob=new Blob([el.outerHTML],{type:'text/html'});
          return el;
        })()
      );
      // Simple fallback: create a styled clone and use toDataURL
      const clone=el.cloneNode(true);
      clone.style.width='500px';
      clone.style.position='fixed';
      clone.style.left='-9999px';
      clone.style.background='#0F0F0F';
      document.body.appendChild(clone);

      // Try html2canvas if available
      if(window.html2canvas){
        const cvs=await window.html2canvas(clone,{backgroundColor:"#0F0F0F",scale:2,useCORS:true,logging:false});
        const link=document.createElement("a");
        link.download="compatibility-result.png";
        link.href=cvs.toDataURL("image/png");
        link.click();
      }else{
        alert("请长按页面截图保存");
      }
      document.body.removeChild(clone);
    }catch(e){
      console.error(e);
      alert("图片生成失败，请尝试直接截图保存");
    }
    setSaving(false);
  },[saving]);

  const copyLink=()=>{
    const url=window.location.href.split('?')[0];
    if(navigator.clipboard){
      navigator.clipboard.writeText(url).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
    }else{
      const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
      setCopied(true);setTimeout(()=>setCopied(false),2000);
    }
  };

  // ═══ INTRO ═══
  if(ph==="intro")return(
    <div style={S.pg}><div style={{...S.wr,opacity:fade?1:0,transition:"opacity 0.5s",paddingTop:80,textAlign:"center"}}>
      <div style={{width:64,height:64,borderRadius:32,background:"linear-gradient(135deg,#00E59B,#00B4D8)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 24px",fontSize:26}}>&#x2728;</div>
      <h1 style={{fontSize:26,fontWeight:300,color:C.text,margin:"0 0 6px",letterSpacing:3}}>默契测试</h1>
      <p style={{fontSize:12,color:C.sub,letterSpacing:3,margin:"0 0 32px",fontFamily:"'DM Sans',sans-serif"}}>COMPATIBILITY CHECK</p>
      <p style={{fontSize:14,lineHeight:2,color:C.sub,fontWeight:300,margin:"0 0 6px",padding:"0 20px"}}>33道场景题，从生活方式到价值观</p>
      <p style={{fontSize:14,lineHeight:2,color:C.sub,fontWeight:300,margin:"0 0 40px"}}>全方位测试我们的默契度</p>
      <button style={{padding:"16px 56px",fontSize:15,fontWeight:500,color:"#0F0F0F",background:"linear-gradient(135deg,#00E59B,#00D4AA)",border:"none",borderRadius:50,letterSpacing:3,boxShadow:"0 4px 24px rgba(0,229,155,0.3)"}} onClick={()=>go(()=>setPh("quiz"))}>
        开始测试
      </button>
      <p style={{fontSize:10,color:C.mut,marginTop:20,letterSpacing:1}}>约5分钟 · 选最真实的选项</p>
      {cachedRes&&(
        <button style={{marginTop:24,padding:"12px 32px",fontSize:13,color:C.accent,background:"transparent",border:"1.5px solid rgba(0,229,155,0.3)",borderRadius:50,letterSpacing:2}} onClick={()=>go(()=>{setRes(cachedRes.res);setAns(cachedRes.ans);setPh("result");})}>
          查看上次测试结果
        </button>
      )}
    </div></div>
  );

  // ═══ CACHED (initial landing if has previous result) ═══
  if(ph==="cached"&&cachedRes){
    const label=getLabel(cachedRes.res.overall);
    return(
      <div style={S.pg}><div style={{...S.wr,opacity:fade?1:0,transition:"opacity 0.5s",paddingTop:60,textAlign:"center"}}>
        <div style={{width:80,height:80,borderRadius:40,background:label.bg,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",boxShadow:"0 6px 24px "+label.c+"33"}}>
          <span style={{fontSize:30,fontWeight:300,color:"#0F0F0F",fontFamily:"'DM Sans'"}}>{cachedRes.res.overall}</span>
        </div>
        <h2 style={{fontSize:18,fontWeight:400,color:label.c,letterSpacing:3,margin:"0 0 6px"}}>{label.t}</h2>
        <p style={{fontSize:12,color:C.sub,margin:"0 0 24px"}}>你上次的测试结果</p>
        <div style={{display:"flex",flexDirection:"column",gap:10,maxWidth:300,margin:"0 auto"}}>
          <button style={{padding:"14px",fontSize:14,fontWeight:500,color:"#0F0F0F",background:"linear-gradient(135deg,#00E59B,#00D4AA)",border:"none",borderRadius:14,letterSpacing:2}} onClick={()=>go(()=>{setRes(cachedRes.res);setAns(cachedRes.ans);setPh("result");})}>
            查看完整报告
          </button>
          <button style={{padding:"14px",fontSize:13,color:C.text,background:"rgba(255,255,255,0.06)",border:"1.5px solid rgba(255,255,255,0.1)",borderRadius:14,letterSpacing:2}} onClick={()=>go(()=>{setQi(0);setAns({});setRes(null);setPh("quiz");})}>
            重新测试
          </button>
        </div>
      </div></div>
    );
  }

  // ═══ QUIZ ═══
  if(ph==="quiz"){
    const q=QS[qi];
    return(
      <div style={S.pg}><div style={S.wr}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"16px 0 10px"}}>
          <div style={{flex:1,height:3,background:"#1E1E1E",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${qi/QS.length*100}%`,background:"linear-gradient(90deg,#00E59B,#00B4D8)",transition:"width 0.4s",borderRadius:2}}/>
          </div>
          <span style={{fontSize:11,color:C.sub,fontFamily:"'DM Sans',sans-serif"}}>{qi+1}/{QS.length}</span>
        </div>
        <div style={{fontSize:10,color:C.accent,letterSpacing:4,textAlign:"center",marginBottom:12,fontWeight:500}}>{dimLabels[q.d]}</div>
        <div style={{...S.cd,opacity:fade?1:0,transform:fade?"none":"translateY(8px)",transition:"all 0.25s"}}>
          <p style={{fontSize:15,lineHeight:1.8,color:C.text,margin:"0 0 22px",textAlign:"center",fontWeight:400}}>{q.t}</p>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {q.o.map((o,i)=>{
              const active=sel===i;
              return(
                <button key={i} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"14px 16px",background:active?"rgba(0,229,155,0.08)":"transparent",border:"1.5px solid "+(active?"#00E59B":"rgba(255,255,255,0.1)"),borderRadius:14,textAlign:"left",transition:"all 0.2s",width:"100%"}} onClick={()=>pick(q.id,o.s,i)}>
                  <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:24,height:24,borderRadius:12,background:active?"rgba(0,229,155,0.2)":"rgba(255,255,255,0.06)",color:active?"#00E59B":"rgba(255,255,255,0.4)",fontSize:10,fontWeight:600,flexShrink:0,marginTop:1,fontFamily:"'DM Sans'"}}>{String.fromCharCode(65+i)}</span>
                  <span style={{fontSize:13,lineHeight:1.6,color:active?"#fff":"rgba(255,255,255,0.7)",fontWeight:active?400:300}}>{o.t}</span>
                </button>
              );
            })}
          </div>
          {qi>0&&(
            <button style={{marginTop:12,padding:"8px 0",fontSize:11,color:C.sub,background:"transparent",border:"none",letterSpacing:1,width:"100%",textAlign:"center"}} onClick={goBack}>&#x2190; 返回上一题</button>
          )}
        </div>
      </div></div>
    );
  }

  // ═══ RESULT ═══
  if(ph==="result"&&res){
    const label=getLabel(res.overall);
    return(
      <div style={S.pg}><div style={S.wr}>
        <div ref={reportRef} style={{background:C.bg,padding:"20px 0"}}>
          <div style={{textAlign:"center",padding:"16px 0 24px"}}>
            <div style={{width:110,height:110,borderRadius:55,background:label.bg,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",boxShadow:"0 8px 32px "+label.c+"33"}}>
              <span style={{fontSize:38,fontWeight:300,color:"#0F0F0F",fontFamily:"'DM Sans'"}}>{res.overall}</span>
            </div>
            <h2 style={{fontSize:22,fontWeight:500,color:label.c,letterSpacing:4,margin:"0 0 4px"}}>{label.t}</h2>
            <p style={{fontSize:13,lineHeight:1.8,color:C.sub,fontWeight:300,margin:0,padding:"0 16px"}}>{label.d}</p>
          </div>
          <div style={{...S.cd,margin:"0 0 12px"}}>
            <h3 style={{fontSize:12,fontWeight:500,color:C.text,letterSpacing:3,margin:"0 0 16px",fontFamily:"'DM Sans'"}}>DIMENSIONS</h3>
            {DIMS.map((d,i)=>{
              const det=res.details[d.key];
              const bc=det.score>=75?"#00E59B":det.score>=45?"#FF9F43":"#FF6B6B";
              return(
                <div key={d.key} style={{marginBottom:i<DIMS.length-1?14:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span style={{fontSize:12,color:C.text}}><span style={{marginRight:6}}>{d.icon}</span>{d.name}</span>
                    <span style={{fontSize:13,color:bc,fontWeight:600,fontFamily:"'DM Sans'"}}>{det.score}%</span>
                  </div>
                  <div style={{height:5,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden",marginBottom:5}}>
                    <div style={{height:"100%",width:det.score+"%",background:bc,borderRadius:3,transition:"width 0.8s"}}/>
                  </div>
                  <p style={{fontSize:11,lineHeight:1.5,color:C.sub,fontWeight:300}}>{det.desc}</p>
                </div>
              );
            })}
          </div>
          {showAns&&(
            <div style={{...S.cd,margin:"0 0 12px"}}>
              <h3 style={{fontSize:12,fontWeight:500,color:C.text,letterSpacing:3,margin:"0 0 16px",fontFamily:"'DM Sans'"}}>YOUR ANSWERS</h3>
              {QS.map((q,i)=>{
                const chosen=ans[q.id];const chosenOpt=q.o.find(o=>o.s===chosen);
                return(
                  <div key={q.id} style={{marginBottom:i<QS.length-1?12:0,paddingBottom:i<QS.length-1?12:0,borderBottom:i<QS.length-1?"1px solid rgba(255,255,255,0.05)":"none"}}>
                    <p style={{fontSize:10,color:C.mut,margin:"0 0 2px"}}>Q{i+1} &middot; {dimLabels[q.d]}</p>
                    <p style={{fontSize:12,color:"rgba(255,255,255,0.75)",margin:"0 0 3px",lineHeight:1.5}}>{q.t}</p>
                    <p style={{fontSize:12,color:"#00E59B",margin:0}}>{chosenOpt?chosenOpt.t:"-"}</p>
                  </div>
                );
              })}
            </div>
          )}
          <div style={{textAlign:"center",padding:"8px 0"}}><p style={{fontSize:10,color:C.mut,letterSpacing:2}}>COMPATIBILITY CHECK &#x2728;</p></div>
        </div>

        <div style={{padding:"8px 0 40px"}}>
          <button style={{...S.ab,background:"rgba(255,255,255,0.06)",border:"1.5px solid rgba(255,255,255,0.1)",color:C.text,marginBottom:8}} onClick={()=>setShowAns(!showAns)}>
            {showAns?"收起答案详情":"查看答案详情"} {showAns?"\u25B2":"\u25BC"}
          </button>
          <button style={{...S.ab,background:"linear-gradient(135deg,#00E59B,#00B4D8)",color:"#0F0F0F",fontWeight:500,marginBottom:8,boxShadow:"0 4px 20px rgba(0,229,155,0.25)"}} onClick={saveImage}>
            {saving?"正在生成...":"保存结果长图 \u{1F4F7}"}
          </button>
          <button style={{...S.ab,background:copied?"rgba(0,229,155,0.15)":"rgba(255,255,255,0.06)",border:"1.5px solid "+(copied?"#00E59B":"rgba(255,255,255,0.1)"),color:copied?"#00E59B":C.text,marginBottom:8}} onClick={copyLink}>
            {copied?"链接已复制 \u2713":"复制测试链接，分享给TA \u{1F517}"}
          </button>
          <button style={{...S.ab,background:"transparent",border:"1.5px solid rgba(255,255,255,0.08)",color:C.sub}} onClick={()=>go(()=>{setPh("intro");setQi(0);setAns({});setRes(null);setShowAns(false);})}>
            重新测试
          </button>
        </div>
      </div></div>
    );
  }
  return null;
}

const S={
  pg:{minHeight:"100vh",background:C.bg,display:"flex",justifyContent:"center",padding:"0 16px"},
  wr:{maxWidth:500,width:"100%"},
  cd:{background:C.card,borderRadius:16,padding:"20px 16px",border:"1px solid "+C.bd},
  ab:{display:"block",width:"100%",padding:"14px",fontSize:13,borderRadius:14,border:"none",letterSpacing:2,textAlign:"center"},
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
