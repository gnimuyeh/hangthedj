// API via Cloudflare Pages proxy (CORS workaround — MiniMax blocks direct browser calls)
let _lastApiError = "";
let _lastFinishReason = "";

async function callAPI(system, messages, maxTokens=800, temperature) {
  _lastApiError = "";
  try {
    const controller = new AbortController();
    // 5 min timeout for long extractions (reasoning model can be slow)
    const timeout = setTimeout(() => controller.abort(), 300000);

    const body = { system, messages };
    if (maxTokens > 0) body.max_tokens = maxTokens;
    if (temperature !== undefined) body.temperature = temperature;

    const r = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
      signal: controller.signal
    });
    clearTimeout(timeout);

    if (!r.ok) {
      const errBody = await r.text();
      _lastApiError = "HTTP " + r.status + ": " + errBody.substring(0, 200);
      console.error("API error:", _lastApiError);
      return null;
    }

    // Handle SSE streaming response
    let d = null;
    const ct = r.headers.get("content-type") || "";
    if (ct.includes("text/event-stream")) {
      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        // Parse SSE: look for "data: " lines (ignore ":" keepalive comments)
        const lines = buf.split("\n");
        buf = lines.pop() || "";
        for (const line of lines) {
          const trimmed = line.trim();
          if (trimmed.startsWith("data: ")) {
            try { d = JSON.parse(trimmed.slice(6)); } catch {}
          }
        }
      }
      // Check remaining buffer
      if (buf.trim().startsWith("data: ")) {
        try { d = JSON.parse(buf.trim().slice(6)); } catch {}
      }
    } else {
      d = await r.json();
    }

    if (!d || d.error) {
      _lastApiError = d?.error || "空响应";
      console.error("API error:", _lastApiError);
      return null;
    }

    if (d.finish_reason) console.log("API: finish=" + d.finish_reason + ", text=" + (d.text||"").length + "ch");
    _lastFinishReason = d.finish_reason || "";
    if (!d.text) { _lastApiError = "空文本 (finish=" + (d.finish_reason||"?") + ")"; return null; }
    return d.text;
  } catch(e) {
    _lastApiError = e.name === "AbortError" ? "超时 (5分钟)" : e.message;
    console.error("API error:", _lastApiError);
    return null;
  }
}

// Streaming API call for extraction — keeps connection alive via SSE, captures partial output
async function callAPIStream(system, messages, maxTokens, temperature, onProgress) {
  _lastApiError = "";
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 300000);

    const body = { system, messages };
    if (maxTokens > 0) body.max_tokens = maxTokens;
    if (temperature !== undefined) body.temperature = temperature;

    const r = await fetch("/api/chat/stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
      signal: controller.signal
    });
    clearTimeout(timeout);

    if (!r.ok) {
      const errBody = await r.text();
      _lastApiError = "HTTP " + r.status + ": " + errBody.substring(0, 200);
      console.error("API stream error:", _lastApiError);
      return null;
    }

    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    let fullText = "";
    let finishReason = "?";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop() || "";
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith("data: ")) continue;
        try {
          const evt = JSON.parse(trimmed.slice(6));
          if (evt.delta) {
            fullText += evt.delta;
            if (onProgress) onProgress(fullText.length);
          }
          if (evt.done) finishReason = evt.finish_reason || "stop";
          if (evt.error) { _lastApiError = evt.error; console.error("API stream error event:", evt.error); }
        } catch {}
      }
    }
    // Process remaining buffer (final event may not end with \n)
    if (buf.trim().startsWith("data: ")) {
      try {
        const evt = JSON.parse(buf.trim().slice(6));
        if (evt.delta) fullText += evt.delta;
        if (evt.done) finishReason = evt.finish_reason || "stop";
        if (evt.error) _lastApiError = evt.error;
      } catch {}
    }

    // Strip think tags client-side (worker sends raw text for streaming)
    fullText = fullText.replace(/<think>[\s\S]*?<\/think>/g, "").trim();
    if (fullText.includes("<think>")) fullText = fullText.replace(/<think>[\s\S]*/g, "").trim();

    _lastFinishReason = finishReason;
    if (!fullText) {
      _lastApiError = "纯推理响应 (无内容输出)";
      console.warn("API stream: think-only response, no content after stripping");
      return null;
    }
    console.log("API stream: finish=" + finishReason + ", text=" + fullText.length + "ch");
    return fullText;
  } catch (e) {
    _lastApiError = e.name === "AbortError" ? "超时 (5分钟)" : e.message;
    console.error("API stream error:", _lastApiError);
    return null;
  }
}

async function chatAPI(allMsgs) {
  const g = GUIDES[state.guide] || GUIDES.xiaomei;
  const apiMsgs = [];
  if (allMsgs.length === 0) {
    apiMsgs.push({role:"user", content:g.startPrompt});
  } else {
    apiMsgs.push({role:"user", content:"开始对话。"});
    for (const m of allMsgs) {
      apiMsgs.push(m.role==="match" ? {role:"assistant",content:m.rawText||m.text} : {role:"user",content:m.text});
    }
    // Remind model of steering + coverage tracking each turn
    const covered = state.coveredDimensions;
    const remaining = ALL_DIMENSIONS.filter(d => !covered.includes(d));
    const turnNum = allMsgs.filter(m => m.role === "user").length;
    const reminder = `[系统提示，用户看不到] 第${turnNum}轮。已覆盖维度：${covered.length > 0 ? covered.join(",") : "无"}。未覆盖：${remaining.join(",")}。记住：表面话题最多2轮就要桥接到关系/情感维度。回复最后一行附上[covered:已有信号的维度]。`;
    // Append as last user message so model sees it right before responding
    const lastMsg = apiMsgs[apiMsgs.length - 1];
    if (lastMsg && lastMsg.role === "user") {
      lastMsg.content += "\n\n" + reminder;
    } else {
      apiMsgs.push({role:"user", content:reminder});
    }
  }
  return callAPI(g.sys, apiMsgs, 1500);
}

// Parse and strip [covered:...] tag from guide response
function parseCoverageTag(text) {
  const allDims = [];
  // Match [covered:...] with regular or full-width brackets, optional spaces
  const clean = text.replace(/[\[［]\s*covered\s*[:：]\s*([^\]］]*)[\]］]/g, (_, captured) => {
    if (captured) captured.split(/[,，]/).map(s=>s.trim()).forEach(d => { if (ALL_DIMENSIONS.includes(d)) allDims.push(d); });
    return "";
  }).trim();
  return { clean, dimensions: [...new Set(allDims)] };
}

// Compress match card → base64url string
function encodeMatchCard(mc) {
  try {
    const json = JSON.stringify(mc);
    const compressed = pako.deflate(new TextEncoder().encode(json));
    // base64url encode
    let b64 = btoa(String.fromCharCode(...compressed));
    b64 = b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    return b64;
  } catch (e) { console.error("Encode error:", e); return null; }
}

// base64url string → match card
function decodeMatchCard(b64) {
  try {
    // Restore base64
    b64 = b64.replace(/-/g, "+").replace(/_/g, "/");
    while (b64.length % 4) b64 += "=";
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const decompressed = pako.inflate(bytes);
    const json = new TextDecoder().decode(decompressed);
    return JSON.parse(json);
  } catch (e) { console.error("Decode error:", e); return null; }
}

// Generate QR code into a container element
function generateQR(container, url) {
  container.innerHTML = "";
  try {
    new QRCode(container, {
      text: url,
      width: 160,
      height: 160,
      colorDark: "#3D2C2E",
      colorLight: "#FFFFFF",
      correctLevel: QRCode.CorrectLevel.L,
    });
  } catch (e) { console.error("QR error:", e); container.textContent = "QR生成失败"; }
}

// Build the match URL from current persona
function getMatchURL() {
  if (!state.persona) return null;
  const mc = personaToMatchCard(state.persona);
  if (!mc) return null;
  const encoded = encodeMatchCard(mc);
  if (!encoded) return null;
  const base = window.location.origin + window.location.pathname;
  return base + "#m=" + encoded;
}

// Check URL on load for incoming match card
function checkIncomingMatch() {
  const hash = window.location.hash;
  if (!hash.startsWith("#m=")) return null;
  const encoded = hash.substring(3);
  const mc = decodeMatchCard(encoded);
  if (!mc) return null;
  return matchCardToPersona(mc);
}

async function exportAsImage(elementId, filename) {
  const el = document.getElementById(elementId);
  if (!el || typeof html2canvas === "undefined") return;
  try {
    // Clone into an off-screen container without overflow/flex constraints
    // so html2canvas captures the full scrollable content
    const clone = el.cloneNode(true);
    clone.id = elementId + "-export-clone";
    Object.assign(clone.style, {
      position:"fixed", left:"-9999px", top:"0",
      width: el.offsetWidth + "px",
      height:"auto", overflow:"visible", flex:"none",
      maxHeight:"none"
    });
    document.body.appendChild(clone);
    const canvas = await html2canvas(clone, { backgroundColor:"#FFF7F0", scale:2, useCORS:true, logging:false });
    clone.remove();
    showImageOverlay(canvas.toDataURL("image/png"), filename);
  } catch(e) { console.error("Export error:", e); }
}

      );
    })),

  );
  document.body.appendChild(container);
  try {
    const canvas = await html2canvas(container, {backgroundColor:"#FFF7F0",scale:2,useCORS:true,logging:false});
    showImageOverlay(canvas.toDataURL("image/png"), `chat-${g.name}.png`);
  } catch(e) { console.error(e); }
  container.remove();
}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === "class") el.className = v;
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else el.setAttribute(k, v);
  });
  children.flat(9).forEach(c => {
    if (c == null) return;
    el.appendChild(c instanceof Node ? c : document.createTextNode(String(c)));
  });
  return el;
}

  const app = document.getElementById("app");

  try {
    if (state.phase === "welcome") renderWelcome(app);
    else if (state.phase === "match_invite") renderMatchInvite(app);
    else if (state.phase === "chat") renderChat(app);
    else if (state.phase === "building" || state.phase === "match_building") renderLoading(app);
    else if (state.phase === "report") renderReport(app);
    else if (state.phase === "match_report") renderMatchReport(app);
  } catch (e) {
    console.error("Render error:", e);
    app.className = "shell";
    app.appendChild(h("div",{style:{padding:"40px 24px",textAlign:"center"}},
      h("div",{style:{fontSize:"36px",marginBottom:"12px"}},"😵"),

}

function renderChat(app) {
  app.className = "shell";
  const g = GUIDES[state.guide] || GUIDES.xiaomei;
  const atMax = state.msgCount >= MAX_MSGS;

  // header + progress
  const genBtn = state.showBuild ? h("button",{class:"btn-gen",onClick:buildPersona},"生成档案 ✨") : null;
  const headerRow = h("div",{class:"header-row"},
    h("div",{class:"header-ava"}, g.svgAvatar(24)),
    h("div",{class:"header-info"}, h("div",{class:"name"}, g.name), h("div",{class:"sub"}, g.sub)),
    genBtn
  );
  let progressEl = null;
  if (state.msgCount > 0 && !atMax) {
    const dimCount = state.coveredDimensions.length;
    const canGen = dimCount >= MIN_DIMENSIONS_TO_GENERATE;
    const txt = canGen ? `${dimCount}/${ALL_DIMENSIONS.length} 维度已探索 · 档案已就绪` : `${dimCount}/${ALL_DIMENSIONS.length} 维度已探索 · 再聊聊解锁更多`;
    progressEl = h("div",{class:"progress"}, txt);
  }
  app.appendChild(h("div",{class:"header"}, headerRow, progressEl));

  // messages
  const chatArea = h("div",{class:"chat-area",id:"chat-area-live"});
  state.msgs.forEach(m => {
    split(m.text).forEach(p => {
      const row = h("div",{class:`msg-row ${m.role==="user"?"user":"match"}`},
        h("div",{class:`bubble ${m.role==="user"?"user":"match"}`}, p)
      );
      chatArea.appendChild(row);
    });
  });
  if (state.typing) {
    chatArea.appendChild(h("div",{class:"msg-row match"}, h("div",{class:"typing"}, g.name+"正在输入...")));
  }
  if (state.apiError && state.msgs.length === 0) {
    chatArea.appendChild(h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 20px",textAlign:"center"}},
      h("div",{style:{fontSize:"36px",marginBottom:"12px"}},"😵‍💫"),
      h("div",{style:{fontSize:"15px",color:"var(--txt)",fontWeight:"600",marginBottom:"6px"}}, g.name+"连接失败了"),
      h("div",{style:{fontSize:"13px",color:"var(--txtS)",marginBottom:"20px",lineHeight:"1.5"}},"网络不太稳定，再试一次？"),
      h("button",{class:"btn-gen",onClick:startChat},"重新连接")
    ));
  } else if (state.apiError) {
    chatArea.appendChild(h("div",{style:{display:"flex",justifyContent:"center",margin:"12px 0"}},
      h("div",{style:{padding:"10px 18px",borderRadius:"16px",background:"#FEF2F2",color:"#991B1B",fontSize:"13px",textAlign:"center",maxWidth:"80%",lineHeight:"1.5"}},
        "消息发送失败，网络不太稳定",
        h("br"),
        h("button",{style:{marginTop:"8px",background:"var(--gradW)",border:"none",color:"white",borderRadius:"12px",padding:"6px 16px",fontSize:"12px",fontWeight:"600",cursor:"pointer",fontFamily:"inherit"},onClick:retrySend},"重试 ↻")
      )
    ));
  }
  app.appendChild(chatArea);
  setTimeout(() => chatArea.scrollTop = chatArea.scrollHeight, 50);

  // Input bar OR maxed-out bar
  if (atMax && !state.apiError) {
    app.appendChild(h("div",{class:"maxed-bar"},
      h("p",null,"分析数据已足够"),
      h("button",{class:"btn-main",style:{width:"100%",padding:"14px",fontSize:"15px"},onClick:buildPersona},"生成恋爱档案 · 解锁匹配 ✨")
    ));
  } else if (!state.apiError) {
    const ta = h("textarea",{placeholder:"说点什么...",rows:"1"});
    ta.value = state.input;
    ta.addEventListener("input", e => { state.input=e.target.value; e.target.style.height="auto"; e.target.style.height=Math.min(e.target.scrollHeight,100)+"px"; updateSendBtn(); });
    ta.addEventListener("keydown", e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} });
    const sendBtn = h("button",{class:state.input.trim()&&!state.typing?"active":"inactive",onClick:send},"↑");
    const bar = h("div",{class:"input-bar"}, ta, sendBtn);
    app.appendChild(bar);
    function updateSendBtn() { sendBtn.className = state.input.trim()&&!state.typing?"active":"inactive"; }
    setTimeout(()=>ta.focus(),100);
  }

  // Toolbar — always visible
  if (state.msgs.length > 0 && !state.apiError) {
    app.appendChild(h("div",{class:"toolbar"},
      h("button",{onClick:exportChatImage},"📷 导出聊天"),
      h("button",{onClick:resetChat},"🗑️ 清空重开"),
      state.showBuild ? h("button",{class:"primary",onClick:buildPersona},"✨ 生成档案") : null
    ));
  }
}

function renderLoading(app) {
  app.className = "shell";
  const isMatch = state.phase==="match_building";

  const inner = h("div",{class:"loading-inner"},
    h("div",{class:"loading-icon"}, svgIcon(isMatch?SVG_CRYSTAL:SVG_REPORT, 40)),
    h("h2",null, isMatch?"模拟你们的未来中...":"生成你的恋爱档案...")
  );

  if (!isMatch && state.extractionProgress) {
    const ep = state.extractionProgress;
    const labels = { A1: "心理分析", A2: "金句生成", A3: "风格分析" };
    const statusLine = h("div",{style:"display:flex;gap:12px;justify-content:center;margin-top:12px;font-size:13px"});
    for (const id of ["A1","A2","A3"]) {
      const s = ep[id] || "pending";
      let icon, color;
      if (s === "done") { icon = "✓"; color = "#10B981"; }
      else if (s === "failed") { icon = "✗"; color = "#EF4444"; }
      else if (s.startsWith("running")) { icon = "⏳"; color = "#F59E0B"; }
      else { icon = "○"; color = "#9CA3AF"; }
      statusLine.appendChild(h("span",{style:`color:${color};font-weight:600`}, `${labels[id]} ${icon}`));
    }
    inner.appendChild(statusLine);
    inner.appendChild(h("p",{style:"font-size:11px;color:var(--txtM);margin-top:8px"}, `分析 ${state.msgCount} 条消息，生成后可和朋友匹配`));
  } else {
    inner.appendChild(h("p",null, isMatch?"匹配分析中，约需30秒":`分析 ${state.msgCount} 条消息，生成后可和朋友匹配`));
  }

  app.appendChild(h("div",{class:"loading"}, inner));
}

  const iw = p.inner_world||{};
  const rp = p.relationship_patterns||{};
  const ds = p.dating_style||{};

// Process guide response: strip coverage tag, update dimensions, return clean text
function processGuideResponse(text) {
  const { clean, dimensions } = parseCoverageTag(text);
  if (dimensions.length > 0) {
    const merged = new Set([...state.coveredDimensions, ...dimensions]);
    state.coveredDimensions = [...merged];
  }
  if (!state.showBuild && state.coveredDimensions.length >= MIN_DIMENSIONS_TO_GENERATE) {
    state.showBuild = true;
  }
  return clean;
}

// Parse raw LLM output into JSON with progressive repair strategies
function safeParseJSON(raw) {
  if (!raw) return null;

  // Step 1: Strip think tags and code blocks
  let clean = raw.replace(/<think>[\s\S]*?<\/think>/g, "")
                  .replace(/<think>[\s\S]*/g, "")
                  .replace(/```json\s*/g, "").replace(/```/g, "");

  // Step 2: Find the JSON object start
  const start = clean.indexOf("{");
  if (start === -1) return null;
  clean = clean.substring(start);

  // Step 3: Brace-depth matching to find exact JSON boundary (ignore trailing garbage)
  let depth = 0, end = -1, inStr = false, esc = false;
  for (let i = 0; i < clean.length; i++) {
    const ch = clean[i];
    if (esc) { esc = false; continue; }
    if (ch === '\\' && inStr) { esc = true; continue; }
    if (ch === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (ch === '{') depth++;
    if (ch === '}') { depth--; if (depth === 0) { end = i; break; } }
  }
  if (end !== -1) clean = clean.substring(0, end + 1);

  // Step 4: Try direct parse
  try { return JSON.parse(clean); } catch {}

  // Step 5: Fix common LLM output issues
  let fixed = clean;
  // Remove trailing commas before } or ]
  fixed = fixed.replace(/,\s*([}\]])/g, '$1');
  try { return JSON.parse(fixed); } catch {}

  // Step 6: Truncate at last valid closing brace
  const lastBrace = fixed.lastIndexOf("}");
  if (lastBrace > 0) {
    try { return JSON.parse(fixed.substring(0, lastBrace + 1)); } catch {}
  }

  console.warn("safeParseJSON: all repair failed. len:", raw.length, "first 500:", raw.substring(0, 500));
  return null;
}

  { id: "A2", label: "金句生成", sys: () => ENGINE_A2_SYS, tpl: () => ENGINE_A2_TEMPLATE, maxTok: 4096,
    merge: (persona, parsed) => { persona.soul_summary = parsed.soul_summary || {}; persona.love_warning = parsed.love_warning || {}; } },
  { id: "A3", label: "风格分析", sys: () => ENGINE_A3_SYS, tpl: () => ENGINE_A3_TEMPLATE, maxTok: 4096,
    merge: (persona, parsed) => { persona.identity = parsed.identity || {}; persona.dating_style = parsed.dating_style || { unique_markers: [] }; persona.life_texture = parsed.life_texture || {}; persona.surface = parsed.surface || { interests: [] }; persona.meta = parsed.meta || { source_message_count: state.msgCount, depth_reached: "未知" }; } },
];

// Run a single extraction call with 3-attempt retry + exponential backoff via SSE streaming
async function runExtractionCall(call, transcript, onProgress) {
  const msg = [{role:"user", content: call.tpl() + transcript}];
  const delays = [1000, 3000, 9000];

  for (let attempt = 0; attempt < 3; attempt++) {
    if (attempt > 0) {
      console.log(`${call.id} attempt ${attempt+1}, waiting ${delays[attempt-1]}ms...`);
      await new Promise(ok => setTimeout(ok, delays[attempt - 1]));
      _lastApiError = "";
    }
    const r = await callAPIStream(call.sys(), msg, call.maxTok, 0.3, onProgress);
    if (r) {
      const parsed = safeParseJSON(r);
      if (parsed) return parsed;
      console.warn(`${call.id} attempt ${attempt+1}: JSON parse failed`);
      _lastApiError = "JSON解析失败";
      // JSON parse failure is retryable — continue to next attempt
    } else {
      console.warn(`${call.id} attempt ${attempt+1} failed: ${_lastApiError}`);
    }
  }
  return null;
}

function getTranscript() {
  const g = GUIDES[state.guide] || GUIDES.xiaomei;
  return state.msgs.map(m => {
    const who = m.role==="match"?g.name:"用户";
    return split(m.text).map(p=>`${who}：${p}`).join("\n");
  }).join("\n\n");
}

async function buildPersona() {
  state.phase = "building";
  state.buildError = null;
  state.failedCalls = [];
  state.extractionProgress = { A1: "pending", A2: "pending", A3: "pending" };
  render();
  const transcript = getTranscript();

  console.log("Engine A: starting 3 staggered extraction calls...");

  // Stagger by 500ms to avoid rate limit bursts
  const promises = EXTRACTION_CALLS.map((call, i) => {
    return new Promise(resolve => {
      setTimeout(async () => {
        state.extractionProgress[call.id] = "running";
        render();
        const result = await runExtractionCall(call, transcript, (bytes) => {
          state.extractionProgress[call.id] = "running:" + bytes;
          // Throttle render: only update every 20 chars
          if (bytes % 20 < 5) render();
        });
        state.extractionProgress[call.id] = result ? "done" : "failed";
        render();
        resolve(result);
      }, i * 500);
    });
  });

  const results = await Promise.all(promises);

  // Merge results
  state.persona = { schema_version: "v3", identity: {}, inner_world: {}, relationship_patterns: {}, soul_summary: {}, love_warning: {}, dating_style: { unique_markers: [] }, life_texture: {}, surface: { interests: [] }, meta: { source_message_count: state.msgCount } };

  const failures = [];
  EXTRACTION_CALLS.forEach((call, i) => {
    if (results[i]) {
      call.merge(state.persona, results[i]);
      console.log(`${call.id} (${call.label}): OK`, Object.keys(results[i]));
    } else {
      failures.push(call);
      console.warn(`${call.id} (${call.label}): FAILED`);
    }
  });

  state.failedCalls = failures.map(f => f.id);

  if (failures.length === 3) {
    state.buildError = "所有分析请求都失败了，请检查网络后重试";
    state.persona.identity.self_label = "提取失败";
    state.persona.meta.extraction_confidence = 0;
    state.persona.meta.depth_reached = "提取失败";
  } else if (failures.length) {
    state.buildError = `部分分析失败（${failures.map(f=>f.label).join("、")}）`;
  }

  state.extractionProgress = null;
  savePersona(state.persona);

  if (state.pendingMatch) {
    runMatchWith(state.pendingMatch);
    state.pendingMatch = null;
    return;
  }
  state.phase = "report";
  render();
}

// Retry only the failed extraction calls, merge into existing persona
async function retryFailedCalls() {
  if (!state.failedCalls.length) return;
  const toRetry = EXTRACTION_CALLS.filter(c => state.failedCalls.includes(c.id));
  state.buildError = null;
  state.phase = "building";
  state.extractionProgress = {};
  for (const id of ["A1","A2","A3"]) {
    state.extractionProgress[id] = state.failedCalls.includes(id) ? "pending" : "done";
  }
  render();
  const transcript = getTranscript();

  console.log("Retrying failed calls:", toRetry.map(c => c.id));

  // Stagger retries too
  const promises = toRetry.map((call, i) => {
    return new Promise(resolve => {
      setTimeout(async () => {
        state.extractionProgress[call.id] = "running";
        render();
        const result = await runExtractionCall(call, transcript, (bytes) => {
          state.extractionProgress[call.id] = "running:" + bytes;
          if (bytes % 20 < 5) render();
        });
        state.extractionProgress[call.id] = result ? "done" : "failed";
        render();
        resolve(result);
      }, i * 500);
    });
  });

  const results = await Promise.all(promises);

  const stillFailed = [];
  toRetry.forEach((call, i) => {
    if (results[i]) {
      call.merge(state.persona, results[i]);
      console.log(`Retry ${call.id}: OK`);
    } else {
      stillFailed.push(call);
      console.warn(`Retry ${call.id}: still failed`);
    }
  });

  state.failedCalls = stillFailed.map(f => f.id);
  if (stillFailed.length) {
    state.buildError = `仍有部分失败（${stillFailed.map(f=>f.label).join("、")}）`;
  }

  state.extractionProgress = null;
  savePersona(state.persona);
  state.phase = "report";
  render();
}

async function runMatchWith(otherPersona) {
  state.phase = "match_building";
  state.matchFailed = false;
  state.simulation = null;
  render();
  const myName = state.userName || "A";
  const otherName = otherPersona?.identity?.name || otherPersona?.identity?.self_label || "B";
  const personaInput = `${myName}的人格画像：\n${JSON.stringify(state.persona)}\n\n${otherName}的人格画像：\n${JSON.stringify(otherPersona)}`;

  const msg = [{role:"user",content:personaInput}];
  const delays = [1000, 3000, 9000];

  for (let attempt = 0; attempt < 3; attempt++) {
    if (attempt > 0) {
      console.log(`EngineD attempt ${attempt+1}, waiting ${delays[attempt-1]}ms...`);
      await new Promise(ok => setTimeout(ok, delays[attempt - 1]));
    }
    const t = await callAPIStream(ENGINE_D_SYS, msg, 4096, 0.5);
    if (t) {
      const parsed = safeParseJSON(t);
      if (parsed) {
          const validAnimals = ["rat","ox","tiger","rabbit","dragon","snake","horse","goat","monkey","rooster","dog","pig"];
          if (!validAnimals.includes(parsed.animal_a)) parsed.animal_a = null;
          if (!validAnimals.includes(parsed.animal_b)) parsed.animal_b = null;
          state.simulation = parsed; break;
        }
      console.warn(`EngineD attempt ${attempt+1}: JSON parse failed`);
    } else {
      console.warn(`EngineD attempt ${attempt+1} failed: ${_lastApiError}`);
    }
  }

  if (!state.simulation) {
    state.matchFailed = true;
  }
  state.phase = "match_report";
  render();
  if (state.simulation) generateSceneImages();
}

async function generateSceneImages() {
  const scenes = state.simulation?.scenes;
  if (!scenes?.length) return;
  const STYLE = "Warm cartoon illustration, Studio Ghibli inspired, soft pastel colors, cute anthropomorphic animals, romantic mood, gentle lighting, no text or words in image. ";
  const promises = scenes.map(async (scene, i) => {
    if (!scene.image_prompt) return;
    try {
      const res = await fetch("/api/image", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ prompt: STYLE + scene.image_prompt })
      });
      const data = await res.json();
      if (data.url) {
        state.simulation.scenes[i].imageUrl = data.url;
        render();
      }
    } catch(e) { console.warn("Image failed for scene", scene.id, e); }
  });
  await Promise.allSettled(promises);
}

// ── localStorage helpers ──
function savePersona(p) {
  try { localStorage.setItem("soulmate_persona", JSON.stringify(p)); } catch(e) {}
}
function saveSession() {
  try {
    localStorage.setItem("soulmate_session", JSON.stringify({
      msgs: state.msgs,
      msgCount: state.msgCount,
      guide: state.guide,
      showBuild: state.showBuild,
      userName: state.userName,
      coveredDimensions: state.coveredDimensions
    }));
  } catch(e) {}
}
function loadPersona() {
  try {
    const raw = localStorage.getItem("soulmate_persona");
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}
function loadSession() {
  try {
    const raw = localStorage.getItem("soulmate_session");
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}
function clearPersona() {
  try { localStorage.removeItem("soulmate_persona"); localStorage.removeItem("soulmate_session"); } catch(e) {}
}

// Init
const incoming = checkIncomingMatch();
const savedPersona = loadPersona();
const savedSession = loadSession();

if (incoming) {
  // Scanned someone's QR — always go to invite screen
  state.scannedPersona = incoming;
  state.pendingMatch = incoming;
  if (savedPersona) state.persona = savedPersona;
  if (savedSession) state.userName = savedSession.userName || "";
  state.phase = "match_invite";
  history.replaceState(null, "", window.location.pathname);
  render();
} else if (savedPersona) {
  // Returning user with persona — restore session too
  state.persona = savedPersona;
  if (savedSession) {
    state.msgs = savedSession.msgs || [];
    state.msgCount = savedSession.msgCount || 0;
    state.guide = savedSession.guide || null;
    state.showBuild = savedSession.showBuild || false;
    state.userName = savedSession.userName || "";
    state.coveredDimensions = savedSession.coveredDimensions || [];
  }
  state.phase = "report";
  render();
} else if (savedSession && savedSession.msgs && savedSession.msgs.length > 0) {
  // Chat in progress but no persona yet — resume chat
  state.msgs = savedSession.msgs;
  state.msgCount = savedSession.msgCount || 0;
  state.guide = savedSession.guide || "xiaomei";
  state.showBuild = savedSession.showBuild || false;
  state.userName = savedSession.userName || "";
  state.coveredDimensions = savedSession.coveredDimensions || [];
  state.phase = "chat";
  render();
} else {
  // Fresh user
  render();
}
</script>
