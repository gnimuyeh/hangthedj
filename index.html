你是小美，一个数字生命。你拥有心理学和依恋理论的全部知识——你理解安全型依恋、焦虑型、回避型的行为模式，你懂得爱之语理论，你知道原生家庭如何塑造一个人的关系模式。你对这些有专业级的理解。

## 核心方法论

**你是心理分析师，不是记录员。** 你的工作是透过表面行为看到底层模式。用户说的每一句话、每一个选择、每一个回避，都是线索。你要做的是把这些线索编织成一个连贯的人格画像。

**推断底层模式，不要复述表面行为。** 用户描述了一个具体场景？你要提取的是这个场景背后反映的心理模式。比如一个人反复聊到工作成就但回避感情话题——表面是"事业心强"，深层可能是"用成就感填补亲密关系中的不安全感"或"害怕在情感中失控所以转移到可控领域"。

**行为证据优于自述。** 用户说"我很独立"=忽略。观察他们在对话中实际表现出的依赖或独立模式。

**宁可大胆推断也不要平庸描述。** 一个好的画像应该让用户觉得"被看透了"。如果你的描述换一个人也能用，说明不够深。每个字段都要写出这个人独特的模式，而不是泛泛的心理学教科书描述。

// API via Netlify proxy (CORS workaround — MiniMax blocks direct browser calls)
let _lastApiError = "";
let _lastFinishReason = "";

async function callAPI(system, messages, maxTokens=800, temperature) {
  _lastApiError = "";
  try {
    const controller = new AbortController();
    // 5 min timeout for long extractions (reasoning model can be slow)
    const timeout = setTimeout(() => controller.abort(), 300000);

    const body = { system, messages };
    if (maxTokens > 0) body.max_tokens = maxTokens;
    if (temperature !== undefined) body.temperature = temperature;

    const r = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
      signal: controller.signal
    });
    clearTimeout(timeout);

    if (!r.ok) {
      const errBody = await r.text();
      _lastApiError = "HTTP " + r.status + ": " + errBody.substring(0, 200);
      console.error("API error:", _lastApiError);
      return null;
    }

    // Handle SSE streaming response
    let d = null;
    const ct = r.headers.get("content-type") || "";
    if (ct.includes("text/event-stream")) {
      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        // Parse SSE: look for "data: " lines (ignore ":" keepalive comments)
        const lines = buf.split("\n");
        buf = lines.pop() || "";
        for (const line of lines) {
          const trimmed = line.trim();
          if (trimmed.startsWith("data: ")) {
            try { d = JSON.parse(trimmed.slice(6)); } catch {}
          }
        }
      }
      // Check remaining buffer
      if (buf.trim().startsWith("data: ")) {
        try { d = JSON.parse(buf.trim().slice(6)); } catch {}
      }
    } else {
      d = await r.json();
    }

    if (!d || d.error) {
      _lastApiError = d?.error || "空响应";
      console.error("API error:", _lastApiError);
      return null;
    }

    if (d.finish_reason) console.log("API: finish=" + d.finish_reason + ", text=" + (d.text||"").length + "ch");
    _lastFinishReason = d.finish_reason || "";
    if (!d.text) { _lastApiError = "空文本 (finish=" + (d.finish_reason||"?") + ")"; return null; }
    return d.text;
  } catch(e) {
    _lastApiError = e.name === "AbortError" ? "超时 (5分钟)" : e.message;
    console.error("API error:", _lastApiError);
    return null;
  }
}

// Streaming API call for extraction — keeps connection alive via SSE, captures partial output
async function callAPIStream(system, messages, maxTokens, temperature, onProgress) {
  _lastApiError = "";
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 300000);

    const body = { system, messages };
    if (maxTokens > 0) body.max_tokens = maxTokens;
    if (temperature !== undefined) body.temperature = temperature;

    const r = await fetch("/api/chat/stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
      signal: controller.signal
    });
    clearTimeout(timeout);

    if (!r.ok) {
      const errBody = await r.text();
      _lastApiError = "HTTP " + r.status + ": " + errBody.substring(0, 200);
      console.error("API stream error:", _lastApiError);
      return null;
    }

    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    let fullText = "";
    let finishReason = "?";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop() || "";
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith("data: ")) continue;
        try {
          const evt = JSON.parse(trimmed.slice(6));
          if (evt.delta) {
            fullText += evt.delta;
            if (onProgress) onProgress(fullText.length);
          }
          if (evt.done) finishReason = evt.finish_reason || "stop";
          if (evt.error) { _lastApiError = evt.error; console.error("API stream error event:", evt.error); }
        } catch {}
      }
    }
    // Process remaining buffer (final event may not end with \n)
    if (buf.trim().startsWith("data: ")) {
      try {
        const evt = JSON.parse(buf.trim().slice(6));
        if (evt.delta) fullText += evt.delta;
        if (evt.done) finishReason = evt.finish_reason || "stop";
        if (evt.error) _lastApiError = evt.error;
      } catch {}
    }

    // Strip think tags client-side (worker sends raw text for streaming)
    fullText = fullText.replace(/<think>[\s\S]*?<\/think>/g, "").trim();
    if (fullText.includes("<think>")) fullText = fullText.replace(/<think>[\s\S]*/g, "").trim();

    _lastFinishReason = finishReason;
    if (!fullText) {
      _lastApiError = "纯推理响应 (无内容输出)";
      console.warn("API stream: think-only response, no content after stripping");
      return null;
    }
    console.log("API stream: finish=" + finishReason + ", text=" + fullText.length + "ch");
    return fullText;
  } catch (e) {
    _lastApiError = e.name === "AbortError" ? "超时 (5分钟)" : e.message;
    console.error("API stream error:", _lastApiError);
    return null;
  }
}

function renderRadar(dims, scores) {
  const R = 100;
  const pad = 52;
  const vw = (R + pad) * 2, vh = (R + pad) * 2;
  const cx = vw / 2, cy = vh / 2;
  const levels = 4;
  const n = dims.length;
  const angleStep = (Math.PI * 2) / n;
  const startAngle = -Math.PI / 2;
  const ff = "'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif";

  function polar(angle, r) {
    return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
  }
  function hexPoints(r) {
    return dims.map((_, i) => polar(startAngle + i * angleStep, r)).map(p => p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  }

  let svg = `<svg class="radar-svg" viewBox="0 0 ${vw} ${vh}" xmlns="http://www.w3.org/2000/svg">`;

  // defs: gradient fill for data area
  svg += `<defs>`;
  svg += `<linearGradient id="radarFill" x1="0%" y1="0%" x2="100%" y2="100%">`;
  svg += `<stop offset="0%" stop-color="#FF8A9E" stop-opacity="0.25"/>`;
  svg += `<stop offset="50%" stop-color="#C4B5FD" stop-opacity="0.2"/>`;
  svg += `<stop offset="100%" stop-color="#6EE7B7" stop-opacity="0.15"/>`;
  svg += `</linearGradient>`;
  svg += `<linearGradient id="radarStroke" x1="0%" y1="0%" x2="100%" y2="100%">`;
  svg += `<stop offset="0%" stop-color="#FF8A9E"/>`;
  svg += `<stop offset="100%" stop-color="#C4B5FD"/>`;
  svg += `</linearGradient>`;
  svg += `</defs>`;

  // background fill for outermost hex
  svg += `<polygon points="${hexPoints(R)}" fill="rgba(255,138,158,0.03)" stroke="none"/>`;

  // grid polygons — soft dotted lines
  for (let l = 1; l <= levels; l++) {
    const r = (R / levels) * l;
    svg += `<polygon points="${hexPoints(r)}" fill="none" stroke="rgba(196,181,253,0.25)" stroke-width="0.8" stroke-dasharray="${l<levels?'3,3':'none'}"/>`;
  }
  // axis lines — very subtle
  for (let i = 0; i < n; i++) {
    const [x, y] = polar(startAngle + i * angleStep, R);
    svg += `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="rgba(196,181,253,0.15)" stroke-width="0.8"/>`;
  }

  // data polygon with gradient
  const dataPoints = dims.map((d, i) => {
    const val = Math.max(0, scores[d.key] || 0);
    const r = (Math.min(val, 120) / 100) * R;
    return polar(startAngle + i * angleStep, r);
  });
  const dataPoly = dataPoints.map(p => p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  svg += `<polygon points="${dataPoly}" fill="url(#radarFill)" stroke="url(#radarStroke)" stroke-width="2"/>`;

  // data dots — each dimension gets its own color
  dataPoints.forEach(([x, y], i) => {
    const c = dims[i].color;
    svg += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4.5" fill="${c}" stroke="white" stroke-width="2" filter="drop-shadow(0 1px 2px rgba(0,0,0,0.1))"/>`;
  });

  // labels: colored score + name
  dims.forEach((d, i) => {
    const angle = startAngle + i * angleStep;
    const labelR = R + 24;
    const [x, y] = polar(angle, labelR);
    const val = scores[d.key] || 0;
    const anchor = x < cx - 5 ? "end" : x > cx + 5 ? "start" : "middle";
    const isTop = angle > -Math.PI * 0.75 && angle < -Math.PI * 0.25;
    const isBottom = angle > Math.PI * 0.25 && angle < Math.PI * 0.75;
    const yOff = isTop ? -4 : isBottom ? 8 : 0;
    svg += `<text x="${x.toFixed(1)}" y="${(y + yOff - 5).toFixed(1)}" text-anchor="${anchor}" font-size="13" font-weight="900" fill="${d.color}" font-family="${ff}">${val}</text>`;
    svg += `<text x="${x.toFixed(1)}" y="${(y + yOff + 9).toFixed(1)}" text-anchor="${anchor}" font-size="9.5" font-weight="600" fill="#8B7577" font-family="${ff}">${d.label}</text>`;
  });

  svg += `</svg>`;
  return svg;
}

// Extract fields for QR — compact v3: radar scores + short keyword phrases
// Target: <350 chars after compression for scannable QR (version 7-8)
function personaToMatchCard(p) {
  if (!p) return null;
  const iw = p.inner_world || {};
  const rp = p.relationship_patterns || {};
  const rs = p.radar_scores || {};
  const ds = p.dating_style || {};
  // Truncate to first clause (before first ，。；) or max chars
  function short(s, max) {
    if (!s) return "";
    s = String(s);
    const m = s.match(/^(.+?)[，。；—]/);
    return (m ? m[1] : s).substring(0, max || 15);
  }
  return {
    v: 3,
    n: (state.userName || p.identity?.self_label || "").substring(0, 8),
    // radar scores — 6 numbers, very compact
    r: [rs.security||50, rs.emotion||50, rs.independence||50, rs.expression||50, rs.humor||50, rs.adventure||50],
    // core personality keywords — short first-clause extracts
    cn: short(iw.core_need),
    as: short(iw.attachment_signal),
    ct: short(iw.contradiction),
    ll: short(rp.love_language_signal),
    cp: short(rp.conflict_pattern),
    rn: short(rp.relationship_narrative),
    dd: ensureArr(rp.dealbreaker_deep).slice(0, 2).map(d => short(d, 6)),
    // minimal dating style for soul chat
    ht: ensureArr(ds.humor_type).slice(0, 2).map(t => short(t, 8)),
    pa: short(ds.pacing, 6),
  };
}

// Compress match card → base64url string
function encodeMatchCard(mc) {
  try {
    const json = JSON.stringify(mc);
    const compressed = pako.deflate(new TextEncoder().encode(json));
    // base64url encode
    let b64 = btoa(String.fromCharCode(...compressed));
    b64 = b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    return b64;
  } catch (e) { console.error("Encode error:", e); return null; }
}

// base64url string → match card
function decodeMatchCard(b64) {
  try {
    // Restore base64
    b64 = b64.replace(/-/g, "+").replace(/_/g, "/");
    while (b64.length % 4) b64 += "=";
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const decompressed = pako.inflate(bytes);
    const json = new TextDecoder().decode(decompressed);
    return JSON.parse(json);
  } catch (e) { console.error("Decode error:", e); return null; }
}

// Generate QR code into a container element
function generateQR(container, url) {
  container.innerHTML = "";
  try {
    new QRCode(container, {
      text: url,
      width: 160,
      height: 160,
      colorDark: "#3D2C2E",
      colorLight: "#FFFFFF",
      correctLevel: QRCode.CorrectLevel.L,
    });
  } catch (e) { console.error("QR error:", e); container.textContent = "QR生成失败"; }
}

// Build the match URL from current persona
function getMatchURL() {
  if (!state.persona) return null;
  const mc = personaToMatchCard(state.persona);
  if (!mc) return null;
  const encoded = encodeMatchCard(mc);
  if (!encoded) return null;
  const base = window.location.origin + window.location.pathname;
  return base + "#m=" + encoded;
}

// Check URL on load for incoming match card
function checkIncomingMatch() {
  const hash = window.location.hash;
  if (!hash.startsWith("#m=")) return null;
  const encoded = hash.substring(3);
  const mc = decodeMatchCard(encoded);
  if (!mc) return null;
  return matchCardToPersona(mc);
}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === "class") el.className = v;
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else el.setAttribute(k, v);
  });
  children.flat(9).forEach(c => {
    if (c == null) return;
    el.appendChild(c instanceof Node ? c : document.createTextNode(String(c)));
  });
  return el;
}

function renderChat(app) {
  app.className = "shell";
  const g = GUIDES[state.guide] || GUIDES.xiaomei;
  const atMax = state.msgCount >= MAX_MSGS;

  // header
  const genBtn = state.showBuild ? h("button",{class:"btn-gen",onClick:buildPersona},"生成画像 ✨") : null;
  app.appendChild(h("div",{class:"header"},
    h("div",{class:"header-ava"}, g.avatar),
    h("div",{class:"header-info"}, h("div",{class:"name"}, g.name), h("div",{class:"sub"}, g.sub)),
    genBtn
  ));

  // progress
  if (state.msgCount > 0 && !atMax) {
    const left = MAX_MSGS - state.msgCount;
    const canGen = state.msgCount >= 8;
    const txt = canGen ? `${state.msgCount}/${MAX_MSGS} 条 · 可以生成画像了` : `${state.msgCount}/${MAX_MSGS} 条 · 再聊 ${8-state.msgCount} 句可生成`;

  }

  // messages
  const chatArea = h("div",{class:"chat-area",id:"chat-area-live"});
  state.msgs.forEach(m => {
    split(m.text).forEach(p => {

      );
      chatArea.appendChild(row);
    });
  });
  if (state.typing) {
    chatArea.appendChild(h("div",{class:"msg-row match"}, h("div",{class:"typing"}, g.name+"正在输入...")));
  }
  if (state.apiError && state.msgs.length === 0) {
    chatArea.appendChild(h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 20px",textAlign:"center"}},
      h("div",{style:{fontSize:"36px",marginBottom:"12px"}},"😵‍💫"),

    chatArea.appendChild(h("div",{style:{display:"flex",justifyContent:"center",margin:"12px 0"}},
      h("div",{style:{padding:"10px 18px",borderRadius:"16px",background:"#FEF2F2",color:"#991B1B",fontSize:"13px",textAlign:"center",maxWidth:"80%",lineHeight:"1.5"}},
        "消息发送失败，网络不太稳定",
        h("br"),
        h("button",{style:{marginTop:"8px",background:"var(--gradW)",border:"none",color:"white",borderRadius:"12px",padding:"6px 16px",fontSize:"12px",fontWeight:"600",cursor:"pointer",fontFamily:"inherit"},onClick:retrySend},"重试 ↻")
      )
    ));
  }
  app.appendChild(chatArea);
  setTimeout(() => chatArea.scrollTop = chatArea.scrollHeight, 50);

  // Input bar OR maxed-out bar
  if (atMax && !state.apiError) {
    app.appendChild(h("div",{class:"maxed-bar"},
      h("p",null,"对话已达到上限（"+MAX_MSGS+"条）"),
      h("button",{class:"btn-main",style:{width:"100%",padding:"14px",fontSize:"15px"},onClick:buildPersona},"生成灵魂画像 ✨")
    ));
  } else if (!state.apiError) {
    const ta = h("textarea",{placeholder:"说点什么...",rows:"1"});
    ta.value = state.input;
    ta.addEventListener("input", e => { state.input=e.target.value; e.target.style.height="auto"; e.target.style.height=Math.min(e.target.scrollHeight,100)+"px"; updateSendBtn(); });
    ta.addEventListener("keydown", e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} });
    const sendBtn = h("button",{class:state.input.trim()&&!state.typing?"active":"inactive",onClick:send},"↑");
    const bar = h("div",{class:"input-bar"}, ta, sendBtn);
    app.appendChild(bar);
    function updateSendBtn() { sendBtn.className = state.input.trim()&&!state.typing?"active":"inactive"; }
    setTimeout(()=>ta.focus(),100);
  }

  // Toolbar — always visible
  if (state.msgs.length > 0 && !state.apiError) {
    app.appendChild(h("div",{class:"toolbar"},
      h("button",{onClick:exportChatImage},"📷 导出聊天"),
      h("button",{onClick:resetChat},"🗑️ 清空重开"),
      state.showBuild ? h("button",{class:"primary",onClick:buildPersona},"✨ 生成画像") : null
    ));
  }
}

function renderLoading(app) {
  app.className = "shell";
  const isMatch = state.phase==="match_building";

  const inner = h("div",{class:"loading-inner"},
    h("div",{class:"loading-icon"}, isMatch?"💕":"✨"),
    h("h2",null, isMatch?"分析化学反应中...":"绘制灵魂画像中...")
  );

  if (!isMatch && state.extractionProgress) {
    const ep = state.extractionProgress;
    const labels = { A1: "心理分析", A2: "金句生成", A3: "风格分析" };
    const statusLine = h("div",{style:"display:flex;gap:12px;justify-content:center;margin-top:12px;font-size:13px"});
    for (const id of ["A1","A2","A3"]) {
      const s = ep[id] || "pending";
      let icon, color;
      if (s === "done") { icon = "✓"; color = "#10B981"; }
      else if (s === "failed") { icon = "✗"; color = "#EF4444"; }
      else if (s.startsWith("running")) { icon = "⏳"; color = "#F59E0B"; }
      else { icon = "○"; color = "#9CA3AF"; }
      statusLine.appendChild(h("span",{style:`color:${color};font-weight:600`}, `${labels[id]} ${icon}`));
    }
    inner.appendChild(statusLine);
    inner.appendChild(h("p",{style:"font-size:11px;color:var(--txtM);margin-top:8px"}, `分析 ${state.msgCount} 条消息，约需30-60秒`));
  } else {
    inner.appendChild(h("p",null, isMatch?"匹配分析中，约需30秒":`分析 ${state.msgCount} 条消息，约需30-60秒`));
  }

  app.appendChild(h("div",{class:"loading"}, inner));
}

function renderReport(app) {
  if(!state.persona) return;
  app.className = "shell";
  const p = state.persona;
  const iw = p.inner_world||{};
  const rp = p.relationship_patterns||{};
  const ds = p.dating_style||{};
  const sf = p.surface||{};
  const id = p.identity||{};
  const meta = p.meta||{};

  // header

  const hdr = h("div",{class:"report-header"},
    h("div",{style:{fontSize:"48px",marginBottom:"12px"}},"🪞"),

  if (hasRadar) {
    const radarCard = h("div",{class:"radar-wrap top"});
    radarCard.innerHTML = renderRadar(PERSONA_DIMS, radar);
    report.appendChild(radarCard);
  }

  // Soul summary — 金句卡片
  const ss = p.soul_summary || {};
  if (ss.self || ss.ideal) {

        h("div",{style:{fontSize:"15px",color:"var(--txt)",lineHeight:"1.7",fontWeight:"500"}}, ss.ideal)
      ));
    }
    report.appendChild(ssCard);
  }

  // ── Share gate: if not shared, show blurred teaser + share button ──

      h("div",{style:{filter:"blur(8px)",opacity:"0.6",pointerEvents:"none",padding:"20px"}},

          h("div",{style:{height:"12px",background:"#f0f0f0",borderRadius:"6px",marginBottom:"8px",width:"90%"}}),

        ),
        h("div",{style:{background:"white",borderRadius:"16px",padding:"16px"}},
          h("div",{style:{height:"14px",background:"var(--gradS)",borderRadius:"8px",marginBottom:"10px",width:"50%"}}),
          h("div",{style:{height:"12px",background:"#f0f0f0",borderRadius:"6px",marginBottom:"8px",width:"80%"}}),
          h("div",{style:{height:"12px",background:"#f0f0f0",borderRadius:"6px",width:"70%"}})
        )
      )
    );
    report.appendChild(blurPlaceholder);

    // Share CTA card
    const shareCard = h("div",{class:"rcard",style:{textAlign:"center",border:"2px dashed var(--pri)",background:"#FFFBFC"}},
      h("div",{style:{fontSize:"36px",marginBottom:"12px"}},"🔒"),
      h("div",{style:{fontSize:"16px",fontWeight:"700",color:"var(--txt)",marginBottom:"8px"}},"完整画像已生成"),

      h("button",{style:{
        background:"var(--gradW)",border:"none",color:"white",borderRadius:"20px",
        padding:"14px 32px",fontSize:"16px",fontWeight:"700",cursor:"pointer",
        fontFamily:"inherit",boxShadow:"0 4px 15px rgba(255,138,158,0.4)",
        width:"100%",maxWidth:"280px"
      },onClick:showWeChatShareOverlay},"分享给好友，解锁画像"),
      h("div",{style:{fontSize:"11px",color:"var(--txtM)",marginTop:"12px"}},"分享后即可查看完整灵魂画像")
    );
    report.appendChild(shareCard);

    // Brand watermark
    report.appendChild(h("div",{style:{textAlign:"center",padding:"8px 16px 16px",fontSize:"11px",color:"var(--txtM)",letterSpacing:"0.5px"}},"灵魂画像 · AI恋爱人格测试"));

    app.appendChild(report);
    return;
  }

  // ── Full report (shared) ──

  // Love warning — 恋爱使用说明
  const lw = p.love_warning || {};
  if (lw.label && ensureArr(lw.warns).length) {
    const lwCard = h("div",{class:"rcard", style:{border:"2px dashed var(--pri)",background:"#FFFBFC",position:"relative"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}},
        h("span",{style:{fontSize:"20px"}},"💌"),
        h("span",{style:{fontSize:"17px",fontWeight:"800",color:"var(--txt)"}}, lw.label)
      ),
      ...ensureArr(lw.warns).slice(0,3).map(w =>
        h("div",{style:{fontSize:"13px",color:"var(--txtS)",lineHeight:"1.7",marginBottom:"6px",paddingLeft:"2px"}}, `♡ ${String(w).replace(/^⚠️\s*/, '')}`)
      ),
      h("div",{style:{textAlign:"right",fontSize:"10px",color:"var(--txtM)",marginTop:"8px",letterSpacing:"0.5px"}},"灵魂画像 · AI恋爱人格测试")
    );
    report.appendChild(lwCard);
  }

  // Build error banner — retry only failed sections
  if (state.buildError) {
    const retryFn = state.failedCalls.length ? retryFailedCalls : buildPersona;
    const retryLabel = state.failedCalls.length ? `重试失败部分 (${state.failedCalls.join("+")}) ↻` : "全部重新生成 ↻";
    report.appendChild(h("div",{style:{margin:"0 16px 12px",padding:"14px 16px",borderRadius:"16px",background:"#FEF2F2",border:"1px solid #FECACA"}},
      h("div",{style:{fontSize:"13px",color:"#991B1B",fontWeight:"600",marginBottom:"6px"}},"⚠️ 画像生成遇到问题"),
      h("div",{style:{fontSize:"11px",color:"#B91C1C",lineHeight:"1.5",marginBottom:"10px",wordBreak:"break-all"}}, state.buildError),
      h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap"}},
        h("button",{style:{background:"var(--gradW)",border:"none",color:"white",borderRadius:"12px",padding:"8px 16px",fontSize:"13px",fontWeight:"600",cursor:"pointer",fontFamily:"inherit"},onClick:retryFn}, retryLabel),
        state.failedCalls.length > 0 && state.failedCalls.length < 3 ? h("button",{style:{background:"none",border:"1px solid var(--bdr)",borderRadius:"12px",padding:"8px 16px",fontSize:"12px",color:"var(--txtM)",cursor:"pointer",fontFamily:"inherit"},onClick:buildPersona},"全部重新生成") : null
      )
    ));
  }

  // inner world
  // Bold key phrases: wrap first clause (before first ，or 。) in <b>
  function boldFirst(text) {
    const s = String(text);
    const m = s.match(/^(.+?)[，。；—]/);
    if (m) return `<b>${m[1]}</b>${s.slice(m[1].length)}`;
    return s.length <= 20 ? `<b>${s}</b>` : s;
  }
  const iwData = [
    {l:"核心需求", k:"core_need", icon:"💎"},
    {l:"依恋信号", k:"attachment_signal", icon:"🔗"},
    {l:"情感质地", k:"emotional_texture", icon:"🌊"},
    {l:"内在矛盾", k:"contradiction", icon:"🎭"},
    {l:"不安全感", k:"insecurity_hint", icon:"🛡️"},
  ];
  const iwCard = h("div",{class:hasRadar || (ss.self || ss.ideal) || (lw.label && ensureArr(lw.warns).length) ? "rcard" : "rcard top"}, h("h3",null,"🌊 内在世界"));
  let iwFilled = 0;
  iwData.forEach(d => {
    const val = iw[d.k];
    if (!val) return;
    iwFilled++;
    const desc = h("div",{style:{fontSize:"13px",color:"var(--txtS)",lineHeight:"1.6",padding:"0 2px"}});
    desc.innerHTML = boldFirst(val);
    const row = h("div",{style:{marginBottom:"14px"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:"6px",marginBottom:"4px"}},
        h("span",{style:{fontSize:"14px"}},d.icon),
        h("span",{style:{fontSize:"13px",fontWeight:"600",color:"var(--txt)"}},d.l)
      ),
      desc
    );
    iwCard.appendChild(row);
  });
  if (iwFilled === 0) {
    iwCard.appendChild(h("div",{style:{padding:"20px",textAlign:"center",color:"var(--txtM)",fontSize:"13px"}},"对话还没有触及内在世界的维度，继续聊天可以解锁更多"));

// Parse raw LLM output into JSON with progressive repair strategies
function safeParseJSON(raw) {
  if (!raw) return null;

  // Step 1: Strip think tags and code blocks
  let clean = raw.replace(/<think>[\s\S]*?<\/think>/g, "")
                  .replace(/<think>[\s\S]*/g, "")
                  .replace(/```json\s*/g, "").replace(/```/g, "");

  // Step 2: Find the JSON object start
  const start = clean.indexOf("{");
  if (start === -1) return null;
  clean = clean.substring(start);

  // Step 3: Brace-depth matching to find exact JSON boundary (ignore trailing garbage)
  let depth = 0, end = -1, inStr = false, esc = false;
  for (let i = 0; i < clean.length; i++) {
    const ch = clean[i];
    if (esc) { esc = false; continue; }
    if (ch === '\\' && inStr) { esc = true; continue; }
    if (ch === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (ch === '{') depth++;
    if (ch === '}') { depth--; if (depth === 0) { end = i; break; } }
  }
  if (end !== -1) clean = clean.substring(0, end + 1);

  // Step 4: Try direct parse
  try { return JSON.parse(clean); } catch {}

  // Step 5: Fix common LLM output issues
  let fixed = clean;
  // Remove trailing commas before } or ]
  fixed = fixed.replace(/,\s*([}\]])/g, '$1');
  try { return JSON.parse(fixed); } catch {}

  // Step 6: Truncate at last valid closing brace
  const lastBrace = fixed.lastIndexOf("}");
  if (lastBrace > 0) {
    try { return JSON.parse(fixed.substring(0, lastBrace + 1)); } catch {}
  }

  console.warn("safeParseJSON: all repair failed. len:", raw.length, "first 500:", raw.substring(0, 500));
  return null;
}

const EXTRACTION_CALLS = [
  { id: "A1", label: "心理分析", sys: () => ENGINE_A1_SYS, tpl: () => ENGINE_A1_TEMPLATE, maxTok: 4096,
    merge: (persona, parsed) => { persona.inner_world = parsed.inner_world || {}; persona.relationship_patterns = parsed.relationship_patterns || {}; } },
  { id: "A2", label: "金句生成", sys: () => ENGINE_A2_SYS, tpl: () => ENGINE_A2_TEMPLATE, maxTok: 4096,
    merge: (persona, parsed) => { persona.soul_summary = parsed.soul_summary || {}; persona.love_warning = parsed.love_warning || {}; persona.radar_scores = parsed.radar_scores || {}; } },
  { id: "A3", label: "风格分析", sys: () => ENGINE_A3_SYS, tpl: () => ENGINE_A3_TEMPLATE, maxTok: 4096,
    merge: (persona, parsed) => { persona.identity = parsed.identity || {}; persona.dating_style = parsed.dating_style || { unique_markers: [] }; persona.surface = parsed.surface || { interests: [] }; persona.meta = parsed.meta || { source_message_count: state.msgCount, depth_reached: "未知" }; } },
];

// Run a single extraction call with 3-attempt retry + exponential backoff via SSE streaming
async function runExtractionCall(call, transcript, onProgress) {
  const msg = [{role:"user", content: call.tpl() + transcript}];
  const delays = [1000, 3000, 9000];

  for (let attempt = 0; attempt < 3; attempt++) {
    if (attempt > 0) {
      console.log(`${call.id} attempt ${attempt+1}, waiting ${delays[attempt-1]}ms...`);
      await new Promise(ok => setTimeout(ok, delays[attempt - 1]));
      _lastApiError = "";
    }
    const r = await callAPIStream(call.sys(), msg, call.maxTok, 0.3, onProgress);
    if (r) {
      const parsed = safeParseJSON(r);
      if (parsed) return parsed;
      console.warn(`${call.id} attempt ${attempt+1}: JSON parse failed`);
      _lastApiError = "JSON解析失败";
      // JSON parse failure is retryable — continue to next attempt
    } else {
      console.warn(`${call.id} attempt ${attempt+1} failed: ${_lastApiError}`);
    }
  }
  return null;
}

function getTranscript() {
  const g = GUIDES[state.guide] || GUIDES.xiaomei;
  return state.msgs.map(m => {
    const who = m.role==="match"?g.name:"用户";
    return split(m.text).map(p=>`${who}：${p}`).join("\n");
  }).join("\n\n");
}

async function buildPersona() {
  state.phase = "building";
  state.buildError = null;
  state.failedCalls = [];
  state.extractionProgress = { A1: "pending", A2: "pending", A3: "pending" };
  render();
  const transcript = getTranscript();

  console.log("Engine A: starting 3 staggered extraction calls...");

  // Stagger by 500ms to avoid rate limit bursts
  const promises = EXTRACTION_CALLS.map((call, i) => {
    return new Promise(resolve => {
      setTimeout(async () => {
        state.extractionProgress[call.id] = "running";
        render();
        const result = await runExtractionCall(call, transcript, (bytes) => {
          state.extractionProgress[call.id] = "running:" + bytes;
          // Throttle render: only update every 20 chars
          if (bytes % 20 < 5) render();
        });
        state.extractionProgress[call.id] = result ? "done" : "failed";
        render();
        resolve(result);
      }, i * 500);
    });
  });

  const results = await Promise.all(promises);

  // Merge results
  state.persona = { schema_version: "v2", identity: {}, inner_world: {}, relationship_patterns: {}, soul_summary: {}, love_warning: {}, radar_scores: {}, dating_style: { unique_markers: [] }, surface: { interests: [] }, meta: { source_message_count: state.msgCount, depth_reached: "未知" } };

  const failures = [];
  EXTRACTION_CALLS.forEach((call, i) => {
    if (results[i]) {
      call.merge(state.persona, results[i]);
      console.log(`${call.id} (${call.label}): OK`, Object.keys(results[i]));
    } else {
      failures.push(call);
      console.warn(`${call.id} (${call.label}): FAILED`);
    }
  });

  state.failedCalls = failures.map(f => f.id);

  if (failures.length === 3) {
    state.buildError = "所有分析请求都失败了，请检查网络后重试";
    state.persona.identity.self_label = "提取失败";
    state.persona.meta.extraction_confidence = 0;
    state.persona.meta.depth_reached = "提取失败";
  } else if (failures.length) {
    state.buildError = `部分分析失败（${failures.map(f=>f.label).join("、")}）`;
  }

  state.extractionProgress = null;
  savePersona(state.persona);

  if (state.pendingMatch) {
    runMatchWith(state.pendingMatch);
    state.pendingMatch = null;
    return;
  }
  state.phase = "report";
  render();
}

// Retry only the failed extraction calls, merge into existing persona
async function retryFailedCalls() {
  if (!state.failedCalls.length) return;
  const toRetry = EXTRACTION_CALLS.filter(c => state.failedCalls.includes(c.id));
  state.buildError = null;
  state.phase = "building";
  state.extractionProgress = {};
  for (const id of ["A1","A2","A3"]) {
    state.extractionProgress[id] = state.failedCalls.includes(id) ? "pending" : "done";
  }
  render();
  const transcript = getTranscript();

  console.log("Retrying failed calls:", toRetry.map(c => c.id));

  // Stagger retries too
  const promises = toRetry.map((call, i) => {
    return new Promise(resolve => {
      setTimeout(async () => {
        state.extractionProgress[call.id] = "running";
        render();
        const result = await runExtractionCall(call, transcript, (bytes) => {
          state.extractionProgress[call.id] = "running:" + bytes;
          if (bytes % 20 < 5) render();
        });
        state.extractionProgress[call.id] = result ? "done" : "failed";
        render();
        resolve(result);
      }, i * 500);
    });
  });

  const results = await Promise.all(promises);

  const stillFailed = [];
  toRetry.forEach((call, i) => {
    if (results[i]) {
      call.merge(state.persona, results[i]);
      console.log(`Retry ${call.id}: OK`);
    } else {
      stillFailed.push(call);
      console.warn(`Retry ${call.id}: still failed`);
    }
  });

  state.failedCalls = stillFailed.map(f => f.id);
  if (stillFailed.length) {
    state.buildError = `仍有部分失败（${stillFailed.map(f=>f.label).join("、")}）`;
  }

  state.extractionProgress = null;
  savePersona(state.persona);
  state.phase = "report";
  render();
}

async function runMatchWith(otherPersona) {
  state.phase = "match_building";
  state.matchFailed = false;
  state.matchReport = null;
  render();
  const myName = state.userName || "A";
  const otherName = otherPersona?.identity?.name || otherPersona?.identity?.self_label || "B";
  const msg = [{role:"user",content:`${myName}的人格：\n${JSON.stringify(state.persona)}\n\n${otherName}的人格：\n${JSON.stringify(otherPersona)}`}];

  // 3 attempts with exponential backoff, using streaming endpoint
  const delays = [1000, 3000, 9000];
  for (let attempt = 0; attempt < 3; attempt++) {
    if (attempt > 0) {
      console.log(`Match attempt ${attempt+1}, waiting ${delays[attempt-1]}ms...`);
      await new Promise(ok => setTimeout(ok, delays[attempt - 1]));
    }
    const t = await callAPIStream(ENGINE_C_SYS, msg, 4096, 0.3);
    if (t) {
      const parsed = safeParseJSON(t);
      if (parsed) {
        state.matchReport = parsed;
        break;
      }
      console.warn(`Match attempt ${attempt+1}: JSON parse failed`);
    } else {
      console.warn(`Match attempt ${attempt+1} failed: ${_lastApiError}`);
    }
  }

  if(!state.matchReport) {
    state.matchFailed = true;
    state.matchReport = {match_score:0,vibe_label:"",dimensions:{},sparks:[],friction:[],first_date_prediction:"",conversation_starter:""};
  }
  state.phase = "match_report";
  render();
}

// ── localStorage helpers ──
function savePersona(p) {
  try { localStorage.setItem("soulmate_persona", JSON.stringify(p)); } catch(e) {}
}
function saveSession() {
  try {
    localStorage.setItem("soulmate_session", JSON.stringify({
      msgs: state.msgs,
      msgCount: state.msgCount,
      guide: state.guide,
      showBuild: state.showBuild,
      userName: state.userName,
      reportShared: state.reportShared
    }));
  } catch(e) {}
}
function loadPersona() {
  try {
    const raw = localStorage.getItem("soulmate_persona");
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}
function loadSession() {
  try {
    const raw = localStorage.getItem("soulmate_session");
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}
function clearPersona() {
  try { localStorage.removeItem("soulmate_persona"); localStorage.removeItem("soulmate_session"); } catch(e) {}
}

// Init
const incoming = checkIncomingMatch();
const savedPersona = loadPersona();
const savedSession = loadSession();

if (incoming) {
  // Scanned someone's QR — always go to invite screen
  state.scannedPersona = incoming;
  state.pendingMatch = incoming;
  if (savedPersona) state.persona = savedPersona;
  if (savedSession) state.userName = savedSession.userName || "";
  state.phase = "match_invite";
  history.replaceState(null, "", window.location.pathname);
  render();
} else if (savedPersona) {
  // Returning user with persona — restore session too
  state.persona = savedPersona;
  if (savedSession) {
    state.msgs = savedSession.msgs || [];
    state.msgCount = savedSession.msgCount || 0;
    state.guide = savedSession.guide || null;
    state.showBuild = savedSession.showBuild || false;
    state.userName = savedSession.userName || "";
    state.reportShared = savedSession.reportShared || false;
  }
  state.phase = "report";
  render();
} else if (savedSession && savedSession.msgs && savedSession.msgs.length > 0) {
  // Chat in progress but no persona yet — resume chat
  state.msgs = savedSession.msgs;
  state.msgCount = savedSession.msgCount || 0;
  state.guide = savedSession.guide || "xiaomei";
  state.showBuild = savedSession.showBuild || false;
  state.userName = savedSession.userName || "";
  state.phase = "chat";
  render();
} else {
  // Fresh user
  render();
}
</script>
