// ─── CALCULATIONS ───
function calc(ans,mode){
  const qs=mode==="full"?QS:QS.slice(0,32);
  const sc={sn:0,le:0,ar:0,oc:0},ct={sn:0,le:0,ar:0,oc:0};
  qs.forEach(q=>{if(ans[q.id]!==undefined){sc[q.d]+=ans[q.id];ct[q.d]++;}});
  const av={};
  Object.keys(sc).forEach(k=>{av[k]=ct[k]?sc[k]/ct[k]:0;});
  const code=(av.sn<=0?"S":"N")+(av.le<=0?"L":"E")+(av.ar<=0?"A":"R")+(av.oc<=0?"O":"C");
  return{code,av};
}

function compat(a,b){
  let tot=0;const det={};
  DIMS.forEach(d=>{
    const va=(a[d.key]||0),vb=(b[d.key]||0);
    const diff=Math.abs(va-vb)/2;// normalize since input is -50~+50 mapped to -2~+2 scale
    const sim=1-diff/2,comp=diff/2;
    const sc=sim*d.sW+comp*d.cW;
    tot+=sc;det[d.key]=Math.round(sc*100);
  });
  return{overall:Math.round(tot/4*100),det};
}

function getDeviceId() {
  let id = localStorage.getItem('lovetype_device_id');
  if (!id) { id = crypto.randomUUID(); localStorage.setItem('lovetype_device_id', id); }
  return id;
}
function saveResultToServer(code, scores) {
  fetch('/api/results', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Device-Id': getDeviceId() },
    body: JSON.stringify({ test_type: 'lovetype', code, scores })
  }).catch(() => {});
}

              <div key={c} style={{padding:"6px 10px",borderRadius:10,background:tg.cL,border:`1px solid ${tg.cM}33`,display:"flex",alignItems:"center",gap:5,cursor:"pointer"}}
                onClick={()=>go(()=>setVt(c))}>
                <span style={{fontSize:16}}>{t.ic}</span><span style={{fontSize:11,fontWeight:500,color:tg.c}}>{c}</span><span style={{fontSize:10,color:P.sub}}>{t.n}</span>
              </div>
            );})}
          </div>
          <h3 style={S.st}>良好拍档</h3>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {tp.gm.map(c=>{const t=TP[c];return(
              <div key={c} style={{padding:"5px 8px",borderRadius:8,background:"rgba(0,0,0,0.02)",border:`1px solid ${P.bd}`,display:"flex",alignItems:"center",gap:4}}>
                <span>{t.ic}</span><span style={{fontSize:10,color:P.sub}}>{c} {t.n}</span>
              </div>
            );})}
          </div>
        </div>
        <button style={{...S.sb,color:g.c,borderColor:g.cM}} onClick={()=>go(()=>setPh("types"))}>← 返回总览</button>
      </div></div>
    );
  }

  // ─── COMPAT SIMULATOR ───
  if(ph==="compat"&&res){
    const tp=TP[res.code],g=GRP[tp.g];
    const theirCode=(sliders.sn<=0?"S":"N")+(sliders.le<=0?"L":"E")+(sliders.ar<=0?"A":"R")+(sliders.oc<=0?"O":"C");
    const theirTp=TP[theirCode];
    const theirG=theirTp?GRP[theirTp.g]:null;
    return(
      <div style={S.pg}><div style={{...S.wr,opacity:fade?1:0,transition:"opacity 0.4s"}}>
        <Nav/>
        <h2 style={{fontSize:16,fontWeight:300,color:P.text,textAlign:"center",margin:"4px 0 14px",letterSpacing:2}}>合盘模拟器</h2>
        <div style={S.cd}>
          <h3 style={{...S.st,marginBottom:14}}>我的恋爱光谱（固定）</h3>
          {dimK.map((dk,i)=>{
            const v=res.av[dk],pct=((v+2)/4)*100,score=Math.round(v*25);
            return(<div key={dk} style={{marginBottom:i<3?14:0}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:2}}>
                <span style={{color:v<=0?"#333":"#aaa",fontWeight:v<=0?600:300}}>{lL[i]}</span>
                <span style={{color:P.mut,letterSpacing:1,fontSize:9}}>{dimN[i]}</span>
                <span style={{color:v>0?"#333":"#aaa",fontWeight:v>0?600:300}}>{rL[i]}</span>
              </div>
              <div style={{position:"relative",height:6,background:"rgba(0,0,0,0.04)",borderRadius:3}}>
                <div style={{position:"absolute",left:"50%",top:0,bottom:0,width:1,background:"rgba(0,0,0,0.08)"}}/>
                <div style={{position:"absolute",left:`${pct}%`,top:"50%",transform:"translate(-50%,-50%)",width:12,height:12,borderRadius:6,background:g.c,border:`2px solid ${P.bg}`,boxShadow:`0 0 0 1px ${g.cM}`}}/>
              </div>
              <div style={{textAlign:"center",fontSize:9,color:P.mut,marginTop:2}}>{score>0?"+":""}{score}</div>
            </div>);
          })}
        </div>

        <div style={S.cd}>
          <h3 style={{...S.st,marginBottom:4}}>TA的恋爱光谱（拖动调节）</h3>
          {theirTp&&<p style={{fontSize:11,color:theirG.c,margin:"0 0 12px"}}>{theirCode} · {theirTp.n}</p>}
          {dimK.map((dk,i)=>{
            const v=sliders[dk];
            return(<div key={dk} style={{marginBottom:i<3?16:0}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:4}}>
                <span style={{color:v<=0?"#333":"#aaa",fontWeight:v<=0?600:300}}>{lL[i]}</span>
                <span style={{color:P.mut,fontSize:9}}>{dimN[i]} · {v>0?"+":""}{v}</span>
                <span style={{color:v>0?"#333":"#aaa",fontWeight:v>0?600:300}}>{rL[i]}</span>
              </div>
              <input type="range" min={-50} max={50} value={v} style={{width:"100%",accentColor:P.accent}}
                onChange={e=>{setSliders(p=>({...p,[dk]:+e.target.value}));setCr(null);}}/>
            </div>);
          })}
          <button style={{...S.compBtn,marginTop:14,width:"100%"}} onClick={doCompat}>开始合盘</button>
        </div>

        {cr&&(
          <div style={{...S.cd,textAlign:"center"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:8}}>
              <div><span style={{fontSize:24}}>{tp.ic}</span><div style={{fontSize:10,color:g.c,fontWeight:500}}>{res.code}</div></div>
              <span style={{fontSize:16,color:P.mut}}>x</span>
              <div><span style={{fontSize:24}}>{theirTp?.ic}</span><div style={{fontSize:10,color:theirG?.c,fontWeight:500}}>{theirCode}</div></div>
            </div>
            <div style={{fontSize:38,fontWeight:200,color:P.text}}>{cr.overall}<span style={{fontSize:13,color:P.sub}}>%</span></div>
            <div style={{fontSize:13,color:cColor(cr.overall),fontWeight:500,letterSpacing:3,margin:"2px 0 14px"}}>{cLabel(cr.overall)}</div>
            <div style={{textAlign:"left"}}>
              {dimK.map((dk,i)=>(
                <div key={dk} style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                  <span style={{fontSize:10,color:"#888",width:58,flexShrink:0}}>{dimN[i]}</span>
                  <div style={{flex:1,height:3,background:"rgba(0,0,0,0.04)",borderRadius:2,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${cr.det[dk]}%`,borderRadius:2,transition:"width 0.5s",
                      background:cr.det[dk]>=70?"#2B8C5E":cr.det[dk]>=50?P.accent:"#C42B4B"}}/>
                  </div>
                  <span style={{fontSize:10,color:P.sub,width:28,textAlign:"right"}}>{cr.det[dk]}%</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div></div>
    );
  }

  // ─── RESULT ───
  if(ph==="result"&&res){
    const tp=TP[res.code],g=GRP[tp.g];
    return(
      <div style={S.pg}><div style={{...S.wr,opacity:fade?1:0,transition:"opacity 0.5s"}}>
        <Nav/>
        <div style={{textAlign:"center",padding:"6px 0 18px"}}>
          <span style={{fontSize:48}}>{tp.ic}</span>
          <div style={{fontSize:22,fontWeight:200,color:g.c,letterSpacing:6,margin:"8px 0 3px"}}>{res.code}</div>
          <h2 style={{fontSize:18,fontWeight:500,color:P.text,margin:"0 0 2px"}}>{tp.n}</h2>
          <p style={{fontSize:10,color:P.sub,margin:"0 0 10px"}}>{tp.en}</p>
          <span style={{fontSize:9,padding:"3px 10px",borderRadius:14,background:g.cL,color:g.c,border:`1px solid ${g.cM}44`}}>{g.n}</span>
          <p style={{fontSize:12,lineHeight:1.7,color:"#555",fontWeight:300,margin:"14px 0 0",padding:"0 6px"}}>{tp.tg}</p>
        </div>

        {/* Spectrum */}
        <div style={S.cd}>
          <h3 style={S.st}>你的恋爱光谱</h3>
          {dimK.map((dk,i)=>{
            const v=res.av[dk],pct=((v+2)/4)*100,score=Math.round(v*25);
            return(<div key={dk} style={{marginBottom:i<3?16:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                <span style={{fontSize:10,color:v<=0?"#333":"#aaa",fontWeight:v<=0?600:300,letterSpacing:1}}>{lL[i]}</span>
                <span style={{fontSize:9,color:P.mut,letterSpacing:2}}>{dimN[i]}</span>
                <span style={{fontSize:10,color:v>0?"#333":"#aaa",fontWeight:v>0?600:300,letterSpacing:1}}>{rL[i]}</span>
              </div>
              <div style={{position:"relative",height:6,background:"rgba(0,0,0,0.04)",borderRadius:3}}>
                <div style={{position:"absolute",left:"50%",top:0,bottom:0,width:1,background:"rgba(0,0,0,0.08)"}}/>
                <div style={{position:"absolute",left:`${pct}%`,top:"50%",transform:"translate(-50%,-50%)",width:14,height:14,borderRadius:7,background:g.c,border:`2px solid ${P.bg}`,boxShadow:`0 0 0 1px ${g.cM}`,transition:"left 0.6s"}}/>
              </div>
              <div style={{textAlign:"center",marginTop:2}}><span style={{fontSize:9,color:P.mut}}>{score>0?"+":""}{score}</span></div>
            </div>);
          })}
        </div>

        {/* Full report */}
        <div style={S.cd}>
          <h3 style={S.st}>人格画像</h3>
          <p style={{fontSize:13,lineHeight:1.9,color:"#444",fontWeight:300,margin:0,whiteSpace:"pre-wrap"}}>{tp.rpt}</p>
        </div>

        <div style={S.cd}>
          <h3 style={S.st}>恋爱超能力</h3>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
            {tp.st.map((s,i)=><span key={i} style={{fontSize:11,padding:"4px 10px",borderRadius:14,background:"#E6F4EA",color:"#1B7340"}}>{s}</span>)}
          </div>
          <h3 style={S.st}>恋爱功课</h3>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {tp.ch.map((c,i)=><span key={i} style={{fontSize:11,padding:"4px 10px",borderRadius:14,background:"#FEF0E1",color:"#B85C00"}}>{c}</span>)}
          </div>
        </div>

        <div style={S.cd}>
          <h3 style={S.st}>理想伴侣</h3>
          <p style={{fontSize:12,lineHeight:1.8,color:"#555",fontWeight:300,margin:"0 0 12px"}}>{tp.ideal}</p>
          <h3 style={S.st}>给你的建议</h3>
          {tp.adv.map((a,i)=><p key={i} style={{fontSize:12,lineHeight:1.7,color:"#555",fontWeight:300,margin:"0 0 6px",paddingLeft:14,position:"relative"}}><span style={{position:"absolute",left:0,color:P.accent}}>{i+1}.</span>{a}</p>)}
        </div>

        <div style={S.cd}>
          <h3 style={S.st}>最佳拍档</h3>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
            {tp.bm.map(c=>{const t=TP[c],tg=GRP[t.g];return(
              <div key={c} style={{padding:"7px 10px",borderRadius:10,background:tg.cL,border:`1px solid ${tg.cM}33`,display:"flex",alignItems:"center",gap:5,cursor:"pointer"}}
                onClick={()=>go(()=>{setVt(c);setPh("td");})}>
                <span style={{fontSize:16}}>{t.ic}</span><div><span style={{fontSize:11,fontWeight:500,color:tg.c}}>{c}</span> <span style={{fontSize:10,color:P.sub}}>{t.n}</span></div>
              </div>
            );})}
          </div>
          <h3 style={S.st}>良好拍档</h3>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {tp.gm.map(c=>{const t=TP[c];return(
              <div key={c} style={{padding:"5px 8px",borderRadius:8,background:"rgba(0,0,0,0.02)",border:`1px solid ${P.bd}`,display:"flex",alignItems:"center",gap:4}}>
                <span>{t.ic}</span><span style={{fontSize:10,color:P.sub}}>{c} {t.n}</span>
              </div>
            );})}
          </div>
        </div>

        <div style={{display:"flex",gap:8}}>
          <button style={{...S.sb,flex:1}} onClick={()=>go(()=>setPh("compat"))}>合盘模拟器 →</button>
          <button style={{...S.sb,flex:1}} onClick={()=>go(()=>setPh("types"))}>16型总览 →</button>
        </div>
        <button style={{...S.sb,marginTop:6}} onClick={()=>go(()=>{setPh("intro");})}>重新测试</button>
        <div style={{height:30}}/>
      </div></div>
    );
  }
  return null;
}

const S={
  pg:{minHeight:"100vh",background:P.bg,display:"flex",justifyContent:"center",padding:"14px 14px",fontFamily:ff,WebkitFontSmoothing:"antialiased"},
  wr:{maxWidth:540,width:"100%"},
  cd:{background:P.card,borderRadius:14,padding:"16px 14px",border:`1px solid ${P.bd}`,marginBottom:10,boxShadow:"0 1px 8px rgba(0,0,0,0.02)"},
  nav:{fontSize:11,color:P.sub,cursor:"pointer"},
  modeBtn:{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"14px",borderRadius:12,cursor:"pointer",border:"none",fontFamily:ff,letterSpacing:2},
  opt:{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",background:"transparent",border:`1px solid ${P.bd}`,borderRadius:10,cursor:"pointer",textAlign:"left",transition:"all 0.2s",width:"100%"},
  dot:{display:"inline-flex",alignItems:"center",justifyContent:"center",width:20,height:20,borderRadius:10,background:P.acL,color:P.accent,fontSize:9,fontWeight:600,flexShrink:0,marginTop:1},
  st:{fontSize:12,fontWeight:500,color:P.text,letterSpacing:2,margin:"0 0 8px"},
  sb:{display:"block",width:"100%",padding:"10px",fontSize:11,color:P.accent,background:"transparent",border:`1px solid ${P.acM}`,borderRadius:10,cursor:"pointer",letterSpacing:2,textAlign:"center"},
  compBtn:{padding:"10px",fontSize:13,fontWeight:400,color:"#fff",background:P.accent,border:"none",borderRadius:10,cursor:"pointer",letterSpacing:2},
};


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
